# Hoofdstuk 3 – Energie

## Toetsvoorbereiding Hoofdstuk 3 – Energie

Controleer bij elke paragraaf of je de leerdoelen hebt bereikt. Zo niet, lees dan de uitleg nog eens goed door of bekijk de uitlegvideo's. Maak daarna de volgende opdrachten.

## Opgave 1

**a.** Wat betekent de wet van behoud van energie? **R**

**b.** Is de kWh een eenheid van vermogen of van energie? **R**

**c.** Welke energieomzettingen vinden er plaats bij een windmolen? (warmte mag je weglaten). **T1**

**d.** Wanneer is een energieopwekking duurzaam? **R**

**e.** Waarom speelt energieopslag een belangrijke rol in de energietransitie?

**Uitwerkingen Opgave 1:**

**a.** Er kan nooit energie ontstaan of verdwijnen. Bij elke energieomzetting blijft de totale hoeveelheid energie gelijk.

**b.** kWh is een eenheid van energie, want \(1 \text{ kW} \times \text{h} = 1000 \text{ J/s} \times 3600 \text{ s} = 3,6 \text{ MJ}\).

**c.** Bewegingsenergie van de lucht → bewegingsenergie van de wieken → bewegingsenergie van de generator → elektrische energie

**d.** Energieopwekking is duurzaam als de bron onuitputtelijk is en als er geen nadelige gevolgen voor volgende generaties zijn.

**e.** Energieopslag kan het gat tussen vraag en aanbod van duurzame energie opvullen.

## Opgave 2

**a.** Geef aan welke energieomzetting er plaatsvindt als een racewagen optrekt bij de start. **T1**

**b.** Teken het energiestroomdiagram van deze beweging als het rendement 35% is. **T1**

**Uitwerkingen Opgave 2:**

**a.** Chemische energie (benzine) → bewegingsenergie en warmte.

**b.** Het energiestroomdiagram begint met chemische energie, die zich vertakt in warmte en bewegingsenergie. Hierbij is de breedte van bewegingsenergiestroom 35% van de chemische energiestroom en de warmtestroom heeft een breedte van 65% van de chemische energiestroom.

## Opgave 3

De temperatuur van een kop hete thee is 65 °C. Je giet 20 g melk van 7 °C bij de thee. De temperatuur van de kop thee daalt dan naar 60 °C. Melk heeft een soortelijke warmte van \(3,9 \times 10^3 \text{ J}/(\text{kg} \times \text{°C})\). Bereken de warmtecapaciteit van de kop thee. **T2**

**Uitwerking Opgave 3:**

\(Q_{\text{thee}} = c \times m \times \Delta T \rightarrow Q_{\text{thee}} = 3,9 \times 10^3 \times 0,02 \times (60 - 7) = 4134 \text{ J}\)

\(Q_{\text{thee}} = Q_{\text{melk}}\) en \(Q_{\text{melk}} = C \times \Delta T\), dus \(4134 = C \times (65 - 60) \rightarrow C = \frac{4134}{5} = 827 \text{ J/°C}\)

## Opgave 4

**Afbeelding / Grafiek – Beschrijving**

- **Type beeld:** Illustratie van een polstokhoogsprong in meerdere fasen.
- **Beschrijving:** Een atleet voert een polstokhoogsprong uit. De afbeelding toont een reeks momentopnamen van de sprong van links naar rechts.
    - **Fase A:** De aanloop met de pols in de hand.
    - **Fase B:** Het moment dat de pols in de grond wordt geplant en buigt, de atleet gaat omhoog.
    - **Fase C:** De atleet gaat over de lat heen en valt naar beneden.
    - Er zijn gekleurde lijnen getekend die de banen van verschillende delen van de atleet of de pols suggereren.
- **Labels:** De letters A, B en C wijzen op specifieke momenten in de sprong.

Bij polstokhoogspringen gebruik je een flexibele stok om over een hoge lat heen te springen. Het kost energie om de stok te buigen. De energie die dan in de stok komt, heet veerenergie. A, B en C geven drie momenten van de sprong weer.

**a.** Welke energievorm is op elk van de momenten A, B en C het grootst? **T1**

**b.** Tijdens de aanloop heeft de springer een bewegingsenergie van 4630 J. Op het hoogste punt op 5,0 m heeft de springer een zwaarte-energie van 3579 J. Bereken het rendement van de sprong. **T1**

**c.** De zwaarte-energie is recht evenredig met de hoogte en de bewegingsenergie is recht evenredig met de snelheid in het kwadraat. Bereken hoe groot de bewegingsenergie van de springer is als zijn snelheid bij de aanloop 1,1 keer zo groot wordt. **T2**

**d.** Bereken hoe hoog de springer dan kan komen als je aanneemt dat het rendement van zijn sprong gelijk blijft. **I**

**Uitwerkingen Opgave 4:**

**a.** A: bewegingsenergie B: veerenergie C: zwaarte-energie

**b.** \(\eta = \frac{E_{\text{nuttig}}}{E_{\text{bron}}} \times 100\% \rightarrow \eta = \frac{3579}{4630} \times 100\% = 77\%\)

**c.** Snelheid keer 1,1, dus bewegingsenergie keer \(1,1^2 = 1,21\). Dus \(4630 \times 1,21 = 5602 \text{ J}\)

**d.** Als het rendement gelijk blijft zal de zwaarte-energie met dezelfde factor toenemen als de bewegingsenergie. De hoogte is evenredig met de zwaarte-energie dus die wordt met dezelfde factor vergroot: \(5,0 \times 1,21 = 6,1 \text{ m}\)

## Opgave 5

Een elektrische auto heeft een actieradius van 500 km bij een constante snelheid van 100 km/h. Om deze afstand bij deze snelheid af te leggen moet de motor een arbeid van 270 MJ leveren.

**a.** Bereken de grootte van de motorkracht bij deze snelheid. **T1**

**b.** Het rendement van de elektromotor is 95%. Bereken hoeveel elektrische energie er nodig is om de 500 km met 100 km/h af te leggen. **T1**

**c.** Een laptopaccu heeft een massa van 400 g en een energiedichtheid van 0,58 MJ/kg. Bereken hoeveel laptopaccu's je nodig zou hebben voor deze elektrische auto. **T2**

**d.** Aan welke belangrijke voorwaarde moet voldaan zijn om elektrisch rijden duurzaam te noemen? **I**

**Uitwerkingen Opgave 5:**

**a.** De arbeid bereken je met \(W = F \times s \rightarrow 270 \times 10^6 = F \times 500 \times 10^3 \rightarrow F = \frac{270 \times 10^6}{500 \times 10^3} = 540 \text{ N}\)

**b.** \(\eta = \frac{E_{\text{nuttig}}}{E_{\text{bron}}} \times 100\% \rightarrow 95\% = \frac{270 \times 10^6}{E_{\text{in}}} \times 100\% \rightarrow E_{\text{in}} = \frac{270 \times 10^6}{0,95} = 284 \text{ MJ}\)

**c.** Je hebt \(\frac{284 \times 10^6}{0,58 \times 10^6} = 490 \text{ kg}\) nodig. Dat zijn \(\frac{490}{0,400} = 1225\) laptopaccu's.

**d.** De elektrische energie moet duurzaam zijn opgewekt.

## Opgave 6

In de gemeente Groningen zijn ongeveer 120 000 huishoudens. Per huishouden is het jaarlijkse elektrische-energiegebruik gemiddeld 3000 kWh. Men wil windmolens van 2,5 MW plaatsen om aan deze vraag te voldoen. Ze zullen gemiddeld 2000 uur per jaar draaien. Bereken hoeveel windmolens nodig zijn om de hele gemeente Groningen van elektrische energie te voorzien. **T2**

**Uitwerking Opgave 6:**

Het totale jaarlijkse energieverbruik van Groningen in kWh is \(120000 \times 3000 = 360 \times 10^6 \text{ kWh}\).

Een windmolen van 2,5 MW = 2500 kW produceert per jaar in kWh met 2000 draaiuren:

\(P = \frac{E}{t} \rightarrow 2,5 \times 10^3 = \frac{E}{2000} \rightarrow E = 2000 \times 2,5 \times 10^3 = 5 \times 10^6 \text{ kWh}\)

Je hebt dus \(\frac{360 \times 10^6}{5 \times 10^6} = 72\) windmolens nodig.

## Opgave 7

Aardwarmte kan gebruikt worden voor het verwarmen van tuinbouwkassen. De temperatuur van het water op een diepte van 2,3 km is 89 °C. Door het warme water op te pompen en af te koelen komt warmte vrij.

**a.** Bereken hoeveel warmte vrijkomt als \(1,0 \times 10^3 \text{ kg}\) water afkoelt van 89 °C tot 8,0 °C. **T1**

**b.** Er is ook energie nodig om het water op te pompen. Bereken de energie die minimaal nodig is om \(1,0 \times 10^3 \text{ kg}\) water omhoog te pompen. **T2**

**c.** Geef twee argumenten waarom aardwarmte de voorkeur heeft boven het verbranden van aardgas. **T1**

**Uitwerkingen Opgave 7:**

**a.** \(Q = c \times m \times \Delta T \rightarrow Q = 4180 \times 1,0 \times 10^3 \times (89 - 8,0) = 339 \text{ MJ}\)

**b.** De energie die dat kost is gelijk aan arbeid die de pomp moet verrichten: \(W = F \times s\), waarbij de kracht van de pomp gelijk moet zijn aan de zwaartekracht.

\(F = F_z = m \times g = 1,0 \times 10^3 \times 9,8 = 9,8 \times 10^3 \text{ N}\)

Invullen geeft \(W = F \times s \rightarrow W = 9,8 \times 10^3 \times 2,3 \times 10^3 = 23 \text{ MJ}\)

**c.** Bij het gebruiken van aardwarmte komt geen CO₂ vrij. Aardwarmte is vrijwel onuitputtelijk.

## Opgave 8

**Afbeelding / Grafiek – Beschrijving**

- **Type beeld:** Schema van een zonnecollector op een dak.
- **Beschrijving:** Een zonnepaneel (collector) ligt schuin op een dak. Rood-oranje golvende pijlen (zonnestraling) vallen op het paneel. Vanuit het paneel loopt een leiding naar een cilindervormige boiler.
- **Labels:** "Afbeelding B", "boiler".

Een zonnecollector lijkt op een zonnepaneel, maar zet de stralingsenergie van de zon direct om in warmte in plaats van in elektrische energie. In een advertentie van een zonnecollector staat dat de oppervlakte 1,6 m² is en dat de opbrengst per jaar 1132 kWh is.

**a.** Laat met een berekening zien dat het gemiddelde vermogen van deze zonnecollector 129 W is. **T1**

**b.** Waarom staat er 'gemiddelde' in vraag a? **T2**

**c.** Het gemiddelde stralingsvermogen in Nederland is 110 W/m². Bereken het rendement van de zonnecollector. **T2**

**d.** De zonnecollector verwarmt het cv-water voor van 16 °C naar 40 °C, zodat de cv-ketel minder gas hoeft te gebruiken. De soortelijke warmte van water is 4180 J/(kg × °C). Bereken hoeveel warmte er nodig is om 1 L water voor te verwarmen. **T1**

**e.** Op een zonnige dag is het stralingsvermogen van de zon 1000 W/m². Bereken hoelang 1 L water zich dan in de zonnecollector moet bevinden om voorverwarmd te kunnen worden. **T2**

**f.** Leg uit of je vindt dat het energieaanbod van de zonnecollector goed past bij de energievraag van een huishouden. **I**

**Uitwerkingen Opgave 8:**

**a.** 1132 kWh per jaar is \(1132 \times 3,6 \times 10^6 = 4,075 \times 10^9 \text{ J}\) per jaar. In een jaar zitten \(365 \times 24 \times 3600 = 31536000\) seconden. Dus per seconde is dat \(\frac{4,075 \times 10^9}{31536000} = 129 \text{ J}\), oftewel een vermogen van 129 W.

**b.** Omdat dit over het hele jaar berekend is inclusief zomer en winter, dag en nacht.

**c.** De zonnecollector heeft een oppervlakte van 1,6 m² dus per m² is het vermogen \(\frac{129}{1,6} = 81 \text{ W}\). Het nuttige vermogen van de zonnecollector is 81 W/m². Het rendement bereken je dan met \(\eta = \frac{P_{\text{nuttig}}}{P_{\text{bron}}} \times 100\% = \frac{81}{110} \times 100\% = 74\%\).

**d.** \(Q = c \times m \times \Delta T \rightarrow Q = 4180 \times 1 \times (40 - 16) = 100320 \text{ J} = 100 \text{ kJ}\)

**e.** Per seconde valt er 1000 J zonne-energie op de zonnecollector. Hiervan kan de zonnecollector per seconde \(\eta = \frac{E_{\text{nuttig}}}{1000} \times 100\% \rightarrow 74\% = \frac{E_{\text{nuttig}}}{1000} \times 100\% \rightarrow E_{\text{nuttig}} = 1000 \times 0,74 = 740 \text{ J}\) gebruiken om water op te warmen. Het nuttig vermogen is dus 740 W. Hiermee kun je de verwarmtijd bereken: \(P = \frac{E}{t} \rightarrow 740 = \frac{100320}{t} \rightarrow t = \frac{100320}{740} = 136 \text{ s}\)

**f.** Hoewel het altijd aan te raden is om water met behulp van zonnewarmte voor te verwarmen is de vraag naar warmte vooral in de winter groot, terwijl het aanbod aan zonne-energie dan laag is. In de zomer geldt het omgekeerde, dus daar sluit de zonnecollector niet erg goed op aan.

# Hoofdstuk 5 – Straling

## Toetsvoorbereiding Hoofdstuk 5 – Straling

Controleer bij elke paragraaf of je de leerdoelen hebt bereikt. Zo niet, lees dan de uitleg nog eens goed door of bekijk de uitlegvideo's. Maak daarna de volgende opdrachten.

## Opgave 1

**a.** Zet de volgende soorten elektromagnetische straling in volgorde van toenemende golflengte: zichtbaar licht, radiogolven, gammastraling, infrarode straling, ultraviolette straling en röntgenstraling. **R**

**b.** Noem een toepassing van radiogolven. **R**

**c.** Bereken de frequentie van straling met een golflengte van 1 m. **T1**

**d.** Bereken de golflengte van straling met een frequentie van \(2,5 \times 10^{18} \text{ Hz}\). **T1**

**Uitwerkingen Opgave 1:**

**a.** Volgorde van toenemende golflengte: gammastraling, röntgenstraling, ultraviolette straling, zichtbaar licht, infrarode straling, radiogolven.

**b.** Toepassing van radiogolven is communicatie (radiozenders, mobieltjes enz.)

**c.** Frequentie uitrekenen: \(\lambda = 1,0 \text{ m}\). \(f = \frac{c}{\lambda} = \frac{3 \times 10^8}{1,0} = 3 \times 10^8 \text{ Hz}\)

**d.** \(f = 2,5 \times 10^{18} \text{ Hz}\). golflengte uitrekenen: \(f = \frac{c}{\lambda} \rightarrow 2,5 \times 10^{18} = \frac{3 \times 10^8}{\lambda} \rightarrow \lambda = \frac{3 \times 10^8}{2,5 \times 10^{18}} = 1,2 \times 10^{-10} \text{ m}\)

**a.** De radioactieve stof nikkel-63 (Ni-63) vervalt onder uitzending van \(\beta\)-straling. Noteer de vervalvergelijking. Maak gebruik van figuur 5.8. **T1**

## Opgave 5

Bij de bestraling van bottumoren wordt renium-188 (Re-188) gebruikt. Atomen van het radioactieve Re-188 worden daarvoor gekoppeld aan atomen van een stof die door botten wordt opgenomen. In de tabel staat een aantal eigenschappen van Re-188.

**Tabel – Eigenschappen Re-188**

| eigenschap | Re-188 |
| :--- | :--- |
| uitgezonden straling | \(\beta\) en \(\gamma\) |
| energie van de \(\beta\)-straling | \(3,4 \times 10^{-13} \text{ J}\) |
| energie van de \(\gamma\)-straling | \(2,5 \times 10^{-14} \text{ J}\) |
| halveringstijd | 17 uur |

**a.** Re-188 ontstaat door het verval van wolfraam-188 (W-188). Leg uit welk deeltje W-188 uitzendt. **T1**

**b.** Welke soort straling levert de grootste bijdrage aan de behandeling van de bottumor. Geef twee argumenten. **T2**

**c.** De bron blijft bruikbaar tot zijn activiteit gedaald is tot 12,5% van de oorspronkelijke waarde. Bereken na hoeveel uur de bron vervangen moet worden. **T1**

**Uitwerkingen Opgave 5:**

**a.** Het aantal kerndeeltjes verandert niet, blijft 188. Het Re-188 moet dus een bètadeeltje uitzenden.

**b.** De bètastraling. Deze vorm van straling wordt helemaal door het lichaam (bot) geabsorbeerd en deze straling heeft ook de meeste energie.

**c.** 100% → 50% → 25% → 12,5%. Na 3 halveringstijden en dat is na \(3 \times 17 \text{ uur} = 51 \text{ uur}\).

## Opgave 6

De isotoop kobalt-60 is een radioactieve stof die onder andere gebruikt wordt voor de bestraling van tumoren. Kobalt-60 vervalt onder uitzending van \(\beta\)-straling en \(\gamma\)-straling.

**a.** Noteer de vervalvergelijking van kobalt-60. Maak gebruik van figuur 5.8. **T1**

**b.** Om een tumor met een massa van 14 g volledig te vernietigen, is een stralingsdosis nodig van 150 J/kg. Tijdens de bestraling absorbeert de tumor \(1,4 \times 10^{-3} \text{ J}\) per s. Bereken hoelang de tumor bestraald moet worden. **T2**

**c.** Kobalt-bronnen worden jaren achter elkaar gebruikt. Om in de loop van die jaren een gelijke stralingsdosis te kunnen realiseren is het noodzakelijk de bestralingstijd bij te stellen. Leg uit of de bestralingstijd in de loop van de jaren langer of korter wordt. **I**

**Uitwerkingen Opgave 6:**

**a.** \(\text{Co} \rightarrow \text{Ni} + e^- + \gamma\)

**b.** Voor de tumor is nodig: \(0,014 \times 150 = 2,1 \text{ J}\). per seconde \(1,4 \times 10^{-3} \text{ J}\) tijdsduur: \(\frac{2,1}{1,4 \times 10^{-3}} = 1,5 \times 10^3 \text{ s} = 25 \text{ minuten}\)

**c.** In de loop van de tijd wordt de activiteit van de bron minder. De bestralingstijd wordt dan langer.

## Opgave 7

De isotoop jood-131 wordt gebruikt om een te snelwerkende schildklier te verkleinen. Vooral de snelwerkende schildkliercellen nemen de radioactieve isotoop op, waardoor die cellen beschadigd worden. Op een bepaald moment is de activiteit van het jood-131 dat door de schildklier is opgenomen \(2,4 \times 10^8 \text{ Bq}\).

**a.** Bereken de activiteit van de schildklier na 24 dagen. Maak gebruik van tabel 5.15. **T1**

**b.** Na 24 dagen gaat de patiënt terug naar het ziekenhuis voor controle. De activiteit van de schildklier wordt gemeten en blijkt \(1,5 \times 10^7 \text{ Bq}\) te zijn. Bereken welke halveringstijd van het jood-131 volgt uit deze meting. **T2**

**c.** Waarom is de activiteit die je bij vraag a berekend hebt groter dan de activiteit die bij b is gemeten? **I**

**Uitwerkingen Opgave 7:**

**a.** De halveringstijd van jood-131 is 8 dagen. 24 dagen is 3 halveringstijden. De activiteit is: 100% → 50% → 25% → 12,5%. \(0,125 \times 2,4 \times 10^8 \text{ Bq} = 3,0 \times 10^7 \text{ Bq}\)

**b.** \(1,5 \times 10^7 \text{ Bq}\) is 6,25% (1/16 deel) van de beginwaarde. 100% → 50% → 25% → 12,5% → 6,25%. Er gaan 4 halveringstijden in 24 dagen. Halveringstijd lijkt 6 dagen te zijn.

**c.** Het lichaam scheidt blijkbaar in die 24 dagen een deel van de actieve kernen uit. Daardoor lijkt de halveringstijd in b kleiner en in a dus groter.

## Opgave 8

**Afbeelding / Grafiek – Beschrijving**

- **Type beeld:** Grafiek met twee krommen.
- **Assen:**
    - X-as: dikte \(x\) (cm), schaal van 0 tot 20.
    - Y-as: intensiteit van de straling (%), schaal van 0 tot 100.
- **Curves:**
    - Een zwarte lijn gelabeld "weefsel": deze daalt geleidelijk. Bij 10 cm is de intensiteit ongeveer 40%.
    - Een bruine/rode lijn gelabeld "bot": deze daalt veel steiler. Bij 4 cm is de intensiteit al gezakt naar ongeveer 20%.
- **Context:** De grafiek toont hoe röntgenstraling wordt tegengehouden door bot en weefsel.

Een röntgenfoto is mogelijk doordat niet alle delen van je lichaam de straling even makkelijk doorlaten. In de grafiek zie je voor bot en weefsel het verband tussen de dikte en de hoeveelheid röntgenstraling die wordt doorgelaten.

**a.** Hoe zie je in de grafiek dat bot de röntgenstraling slechter doorlaat dan weefsel? **T1**

**b.** De straling gaat door je bovenbeen. Eerst door 4 cm weefsel, daarna door 4 cm bot en vervolgens weer door 4 cm weefsel. Bepaal hoeveel procent van de straling je bovenbeen doorlaat. **I**

**Uitwerkingen Opgave 8:**

**a.** De lijn die hoort bij bot ligt overal lager dan de weefsellijn. Dat betekent dat de straling die door het bot gaat overal minder is dan de straling die het weefsel passeert.
