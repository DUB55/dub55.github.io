# Leerdoelen H4 - De wereld na 1945

## 1. Verandering en continuïteit tussen de eerste helft en de tweede helft van de twintigste eeuw

Je kunt bij ieder van de volgende onderdelen een voorbeeld noemen van verandering en continuïteit tussen de eerste helft en de tweede helft van de twintigste eeuw:

* **Politiek** (te maken met hoe het land bestuurd werd)
* **Cultureel** (hoe mensen dachten: wetenschap, religie, kunst)
* **Sociaal** (hoe mensen samenleefden of in groepen leefden)
* **Economisch** (hoe mensen omgaan met inkomen, welvaart, handel)

### 1. Voorbeelden van verandering en continuïteit tussen de eerste en tweede helft van de twintigste eeuw:

* **Politiek:** Een grote verandering was de dekolonisatie; waar Europa in de eerste helft van de eeuw nog wereldrijken bezat, werden na 1945 de meeste koloniën onafhankelijk. Continuïteit is te zien in de blijvende machtsstrijd tussen grote mogendheden, die overging van de wereldoorlogen in de Koude Oorlog.
* **Cultureel:** Een verandering was de opkomst van een specifieke jongerencultuur en de amerikanisering van de Europese levensstijl. Continuïteit bleef zichtbaar in religieuze spanningen die grenzen bleven bepalen, zoals bij de splitsing van India en Pakistan.
* **Sociaal:** Een verandering was de strijd voor gelijke burgerrechten en het einde van de segregatie in de VS. Continuïteit was de sociale ongelijkheid in de wereld, waarbij de kloof tussen rijk en arm bleef bestaan en in sommige gevallen zelfs groeide.
* **Economisch:** Een verandering was de enorme welvaartsgroei en de opkomst van de consumptiemaatschappij in het Westen. Continuïteit was de kwetsbare positie van veel ex-koloniën die economisch afhankelijk bleven van de export van grondstoffen (monocultuur).

## 4.1 Einde van de wereldrijken

2. Je kunt de rol uitleggen die nationalistische bewegingen speelden in het verkrijgen van onafhankelijkheid na 1945
3. Je kunt uitleggen waarom de Tweede Wereldoorlog het streven naar onafhankelijkheid van koloniën heeft versneld
4. Je kunt uitleggen hoe verschillend de dekolonisatie verliep in
   a. Indonesië
   b. India en Pakistan
   c. Israël/Palestina
   d. Algerije en Marokko
   e. De rest van Afrika

### 4.1 Einde van de wereldrijken

2. **De rol van nationalistische bewegingen:** Nationalistische bewegingen, zoals de PNI van Soekarno in Indonesië en de beweging van Gandhi in India, speelden een cruciale rol door het volk te mobiliseren tegen de koloniale overheerser. Zij streefden naar zelfbeschikking en maakten gebruik van het verzwakte gezag van de Europese landen na de Tweede Wereldoorlog om de onafhankelijkheid uit te roepen of af te dwingen.
3. **Versnelling door de Tweede Wereldoorlog:** De oorlog versnelde de dekolonisatie omdat de Europese koloniale machten (zoals Nederland, Frankrijk en Groot-Brittannië) militair en economisch verzwakt waren. Bovendien hadden de Japanners in Zuidoost-Azië laten zien dat de westerse machten niet onoverwinnelijk waren. De nieuwe supermachten, de VS en de Sovjet-Unie, waren beiden om ideologische redenen tegen kolonialisme.
4. **Verschillen in verloop van de dekolonisatie:**

   * **a. Indonesië:** Verliep via een bloedige onafhankelijkheidsoorlog (1945-1949) tegen Nederland, inclusief 'politionele acties', totdat de VS en de VN Nederland dwongen de onafhankelijkheid te accepteren.
   * **b. India en Pakistan:** Verliep relatief vreedzaam wat betreft de overdracht door de Britten in 1947, maar leidde tot een gewelddadige splitsing tussen hindoes (India) en moslims (Pakistan) met miljoenen vluchtelingen.
   * **c. Israël/Palestina:** Na het vertrek van de Britten in 1948 riep Ben Goerion de staat Israël uit, wat direct leidde tot een oorlog met de Arabische buurlanden en een vluchtelingenstroom van Palestijnen.
   * **d. Algerije en Marokko:** Algerije vocht een bloedige achtjarige oorlog (1954-1962) tegen Frankrijk omdat daar veel Franse kolonisten woonden. Marokko (en Tunesië) werden in 1956 zonder strijd onafhankelijk omdat Frankrijk niet twee oorlogen tegelijk kon voeren.
   * **e. De rest van Afrika:** Ten zuiden van de Sahara droegen de Britten, Fransen en Belgen de macht meestal vreedzaam over tussen 1957 en 1964. Alleen de Portugezen hielden tot 1974 met geweld vast aan hun kolonies (Angola, Mozambique).

## 4.2 De Koude Oorlog

5. Je kunt uitleggen hoe de blokvorming tussen Oost en West ontstond
6. Je kunt uitleggen hoe de Verenigde Staten de verspreiding van het communisme probeerden tegen te gaan
7. Je kunt uitleggen wat de invloed is van atoomwapens op de geopolitieke verhoudingen
8. Je kunt uitleggen hoe de Koude Oorlog de volgende zaken veroorzaakte:
   a. De Duitse deling
   b. De Korea-oorlog
   c. De Berlijnse muur
   d. De Cubacrisis
   e. De Vietnamoorlog

### 4.2 De Koude Oorlog

5. **Ontstaan van de blokvorming:** De blokvorming ontstond door diep wantrouwen tussen de VS en de Sovjet-Unie na 1945. Er ontstonden twee invloedssferen: de landen bevrijd door de westerse geallieerden werden kapitalistisch/democratisch, terwijl de door het Rode Leger bezette landen communistische dictaturen werden (het Oostblok).
6. **Tegengaan van communisme door de VS:** De VS voerden de containmentpolitiek (indamming). Dit deden ze economisch via de Marshallhulp (miljarden dollars voor de opbouw van Europa om armoede, en daarmee de voedingsbodem voor communisme, te bestrijden) en militair via de oprichting van de NAVO.
7. **Invloed van atoomwapens:** Atoomwapens zorgden voor een wapenwedloop, maar voorkom ook een directe 'hete' oorlog tussen de supermachten uit angst voor totale wederzijdse vernietiging. Dit leidde tot periodes van ontspanning en de installatie van de 'hotline' na de Cubacrisis om ongelukken te voorkomen.
8. **Oorzaken van specifieke zaken door de Koude Oorlog:**

   * **a. De Duitse deling:** Duitsland werd verdeeld in bezettingszones die in 1949 uitgroeiden tot twee staten: de democratische Bondsrepubliek (West) en de communistische DDR (Oost).
   * **b. De Korea-oorlog:** Ontstond toen het communistische Noorden met steun van de Sovjet-Unie het kapitalistische Zuiden binnenviel; de VS grepen in onder de vlag van de VN.
   * **c. De Berlijnse muur:** Gebouwd door de DDR in 1961 om de vlucht van burgers van Oost- naar West-Berlijn te stoppen.
   * **d. De Cubacrisis:** De gevaarlijkste crisis waarbij de Sovjet-Unie kernraketten op Cuba plaatste, vlakbij de VS; na een Amerikaanse blokkade trok de Sovjet-Unie de raketten terug.
   * **e. De Vietnamoorlog:** Een conflict waarbij de VS het kapitalistische Zuiden steunden tegen het communistische Noorden (gesteund door de Sovjet-Unie en China) om verdere verspreiding van het communisme in Azië te voorkomen.

## 4.3 De VS vanaf de Tweede Wereldoorlog

9. Je kunt aan de hand van een aantal voorbeelden uitleggen wat “the American Way of Life” was en wat de jongerencultuur inhield
10. Je kunt uitleggen hoe dit van invloed was op de Europese / Nederlandse levensstijl
11. Je kunt uitleggen hoe de Verenigde Staten een grote economische groei doormaakten vlak na de Tweede Wereldoorlog
12. Je kunt uitleggen hoe de grotere etnische diversiteit in de VS zorgden voor onderlinge spanning

### 4.3 De VS vanaf de Tweede Wereldoorlog

9. **"The American Way of Life" en de jongerencultuur:** De Amerikaanse levensstijl werd gekenmerkt door een hoge consumptie (auto's, televisies, witgoed), wonen in voorsteden (suburbs) en optimisme. De jongerencultuur ontstond doordat jongeren voor het eerst eigen geld (zakgeld/loon) hadden, waarmee ze eigen kleding en muziek (rock-'n-roll, Elvis Presley) kochten, los van de smaak van hun ouders.
10. **Invloed op Europa:** Via amerikanisering namen Europeanen de Amerikaanse cultuur over: ze gingen ook massaal auto's en televisies kopen en namen de jongerencultuur en muziek over.
11. **Economische groei na de oorlog:** De groei kwam door de enorme oorlogsproductie die de werkloosheid beëindigde, gevolgd door een grote vraag naar consumptiegoederen na de oorlog. De babyboom zorgde voor een extra vraag naar producten en woningen. Daarnaast werkte de Amerikaanse industrie zeer efficiënt door specialisatie en mechanisatie.
12. **Etnische diversiteit en spanning:** De VS hadden een grote zwarte minderheid die wettelijk werd achtergesteld via segregatie (rassenscheiding) in onderwijs, leger en openbaar vervoer. Dit leidde in de jaren '50 en '60 tot grote spanningen en massale acties van de burgerrechtenbeweging onder leiding van o.a. Martin Luther King.

## 4.4 Samenwerking en democratie

13. Je kunt uitleggen waarom er na de Tweede Wereldoorlog juist werd gekozen voor Europese samenwerking
14. Je kunt met voorbeelden van Europese samenwerkingsorganisaties uitleggen hoe deze zich steeds verder uitbreidde
15. Je kunt uitleggen wat het verband is tussen de Europese samenwerkingen en de Koude Oorlog

### 4.4 Samenwerking en democratie

13. **Keuze voor Europese samenwerking:** Landen wilden de economie versterken door de fouten van de jaren '30 (protectionisme) te vermijden. Bovendien wilden Frankrijk en Duitsland de vrede bewaren door hun zware industrieën (kolen en staal) aan elkaar te koppelen, zodat ze niet meer ongemerkt een oorlog konden voorbereiden.
14. **Uitbreiding van samenwerkingsorganisaties:** Het begon met de Benelux (1948), gevolgd door de EGKS (1952) van zes landen. Dit breidde zich uit naar de EEG (1958) met een gemeenschappelijke markt en later de Europese Unie (1993). Het aantal lidstaten groeide van de oorspronkelijke zes naar negen (1973), tien (1981) en twaalf (1986).
15. **Verband met de Koude Oorlog:** De VS stimuleerden Europese samenwerking via de Marshallhulp, omdat ze een sterk en verenigd West-Europa wilden als buffer tegen het communisme. De Europese eenheid maakte deel uit van het westelijke blok in de Koude Oorlog.

## 4.5 Welvaart en armoede

16. Je kunt uitleggen waarom het verschil tussen arm en rijk in de wereld groter werd
    a. Je kunt uitleggen hoe politieke keuzes invloed hadden op dit verschil
    b. Je kunt uitleggen hoe economische keuzes invloed hadden op dit verschil
17. Je kunt uitleggen wat er wordt bedoeld met de termen “Eerste, Tweede en Derde Wereld”
18. Je kunt uitleggen wat de sociale, politieke en economische gevolgen waren van De Grote Sprong Voorwaarts.
19. Je kunt uitleggen hoe de Indiase overheid zich bemoeide met de economie van het land
20. Je kunt uitleggen waarom de staatsgreep in Zuid-Korea relatief succesvol was
21. Je kunt uitleggen welke politieke ontwikkelingen er plaatsvonden in Indonesië
22. Je kunt uitleggen welke politieke ontwikkelingen er plaatsvonden in Suriname

### 4.5 Welvaart en armoede

16. **Groter verschil tussen arm en rijk:**

* **a. Politieke keuzes:** In het Westen zorgden stabiele democratieën voor groei, terwijl veel arme landen te maken kregen met dictaturen, burgeroorlogen en wanbestuur (bijv. Ethiopië).
* **b. Economische keuzes:** De westerse landen industrialiseerden snel, terwijl veel derdewereldlanden bleven steken in een kwetsbare monocultuur of te maken kregen met een bevolkingsexplosie die de economische groei tenietdeed.

17. **Eerste, Tweede en Derde Wereld:** De Eerste Wereld bestond uit de rijke, kapitalistische westerse landen; de Tweede Wereld uit de communistische landen; de Derde Wereld uit de arme landen die niet tot de eerste twee blokken behoorden en vaak nog een landbouwstedelijke samenleving hadden.
18. **Gevolgen van de Grote Sprong Voorwaarts:** Mao wilde China in korte tijd industrialiseren via communes en lokale hoogovens. De sociale en politieke gevolgen waren totale staatscontrole op het leven, maar de economische gevolgen waren rampzalig: de landbouw stortte in, wat leidde tot een hongersnood waarbij circa 45 miljoen mensen stierven.
19. **Indiase overheid en de economie:** De overheid gaf subsidies aan de zware industrie (staal, mijnen), beschermde de eigen markt met hoge importtarieven en stimuleerde de landbouw met kunstmest en irrigatie om hongersnoden te voorkomen.
20. **Succes van de staatsgreep in Zuid-Korea:** Onder generaal Park richtte de overheid zich op het onderwijs en een exportgerichte industrie. Door grote bedrijven (zoals Samsung) te steunen met goedkope leningen, kon Zuid-Korea de wereldmarkt veroveren en groeide de welvaart razendsnel.
21. **Politieke ontwikkelingen in Indonesië:** Onder Soekarno was er chaos en armoede. Na een militaire coup in 1965/1967 nam generaal Soeharto de macht over. Zijn regime was een dictatuur die het communisme bestreed, de export bevorderde, maar ook gekenmerkt werd door enorme corruptie. In 1998 werd de democratie hersteld.
22. **Politieke ontwikkelingen in Suriname:** Na de onafhankelijkheid in 1975 volgde in 1980 een militaire staatsgreep onder leiding van Desi Bouterse. Dit leidde tot het stopzetten van Nederlandse hulp, economische chaos, moorden op tegenstanders en uiteindelijk het herstel van de democratie in 1987 om weer financiële steun te krijgen.
