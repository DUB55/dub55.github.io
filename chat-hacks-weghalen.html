<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Dark mode colors from styling guide */
            --background: 222.2 84% 4.9%;
            --foreground: 210 40% 98%;
            --card: 222.2 84% 4.9%;
            --border: 217.2 32.6% 17.5%;
            --muted: 215 27.9% 16.9%;
            --accent: 210 40% 98%;
            --primary: 210 40% 98%;
            --secondary: 217.2 32.6% 17.5%;
            
            /* Typography */
            --font-inter: 'Inter', sans-serif;
            --font-cormorant: 'Cormorant Garamond', serif;
            
            /* Discord-specific colors for chat */
            --brand: 222.2 47.4% 60%;
            --brand-hover: 222.2 47.4% 50%;
            --green: 142 76% 36%;
            --red: 0 72% 51%;
        }

        body {
            font-family: var(--font-inter);
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: hsl(var(--card));
            display: flex;
            flex-direction: column;
            border-right: 1px solid hsl(var(--border));
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid hsl(var(--border));
        }

        .server-name {
            color: hsl(var(--foreground));
            font-size: 16px;
            font-weight: 600;
            font-family: var(--font-inter);
        }

        .connection-status {
            padding: 16px;
            margin-top: 8px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: hsl(var(--muted));
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: hsl(var(--muted));
        }

        .status-dot.connected {
            background-color: hsl(var(--green));
            box-shadow: 0 0 8px hsl(var(--green));
        }

        .status-dot.waiting {
            background-color: #FAA61A;
        }

        .status-dot.error {
            background-color: hsl(var(--red));
        }

        .room-info {
            padding: 16px;
            margin-top: 8px;
            background-color: hsl(var(--muted));
            border-radius: 8px;
            border: 1px solid hsl(var(--border));
        }

        .room-label {
            font-size: 12px;
            color: hsl(var(--muted));
            margin-bottom: 8px;
            font-family: var(--font-inter);
        }

        .room-link {
            font-size: 13px;
            color: hsl(var(--foreground));
            word-break: break-all;
            font-family: var(--font-inter);
        }

        .copy-button {
            margin-top: 8px;
            padding: 8px 12px;
            background-color: hsl(var(--brand));
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-family: var(--font-inter);
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .copy-button:hover {
            background-color: hsl(var(--brand-hover));
        }

        .copy-button:disabled {
            background-color: hsl(var(--muted));
            cursor: not-allowed;
        }

        .export-section {
            padding: 16px;
            margin-top: auto;
            border-top: 1px solid hsl(var(--border));
        }

        .export-button {
            width: 100%;
            padding: 10px;
            background-color: hsl(var(--green));
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            font-family: var(--font-inter);
            transition: background-color 0.2s;
        }

        .export-button:hover {
            background-color: hsl(142 76% 30%);
        }

        .export-button:disabled {
            background-color: hsl(var(--muted));
            cursor: not-allowed;
        }

        /* Main Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: hsl(var(--background));
        }

        .chat-header {
            padding: 16px;
            border-bottom: 1px solid hsl(var(--border));
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-title {
            color: hsl(var(--foreground));
            font-size: 16px;
            font-weight: 600;
            font-family: var(--font-inter);
        }

        .chat-subtitle {
            color: hsl(var(--muted));
            font-size: 13px;
            margin-top: 4px;
            font-family: var(--font-inter);
        }

        /* Messages Container */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            gap: 12px;
            padding: 8px;
            border-radius: 4px;
            transition: background-color 0.1s;
        }

        .message:hover {
            background-color: hsl(var(--muted));
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: hsl(var(--brand));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
            font-family: var(--font-inter);
        }

        .message-content {
            flex: 1;
            min-width: 0;
        }

        .message-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-author {
            color: hsl(var(--foreground));
            font-weight: 500;
            font-size: 15px;
            font-family: var(--font-inter);
        }

        .message-timestamp {
            color: hsl(var(--muted));
            font-size: 12px;
            font-family: var(--font-inter);
        }

        .message-text {
            color: hsl(var(--foreground));
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            font-family: var(--font-inter);
        }

        .message-image {
            max-width: 400px;
            max-height: 300px;
            border-radius: 8px;
            margin-top: 8px;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid hsl(var(--border));
        }

        .message-image:hover {
            transform: scale(1.02);
        }

        .system-message {
            text-align: center;
            color: hsl(var(--muted));
            font-size: 13px;
            padding: 8px;
            font-style: italic;
            font-family: var(--font-inter);
        }

        /* Input Area */
        .input-area {
            padding: 16px;
            background-color: hsl(var(--background));
        }

        .input-container {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            background-color: hsl(var(--muted));
            border: 1px solid hsl(var(--border));
            border-radius: 8px;
            padding: 8px;
        }

        .input-container.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .image-button {
            width: 40px;
            height: 40px;
            background-color: hsl(var(--secondary));
            border: 1px solid hsl(var(--border));
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: hsl(var(--foreground));
            transition: all 0.2s;
        }

        .image-button:hover {
            background-color: hsl(var(--muted));
            color: hsl(var(--accent));
        }

        .image-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message-input {
            flex: 1;
            background-color: transparent;
            border: none;
            color: hsl(var(--foreground));
            font-size: 15px;
            padding: 8px;
            resize: none;
            outline: none;
            max-height: 200px;
            font-family: var(--font-inter);
        }

        .message-input::placeholder {
            color: hsl(var(--muted));
        }

        .send-button {
            width: 40px;
            height: 40px;
            background-color: hsl(var(--brand));
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: background-color 0.2s;
        }

        .send-button:hover {
            background-color: hsl(var(--brand-hover));
        }

        .send-button:disabled {
            background-color: hsl(var(--muted));
            cursor: not-allowed;
        }

        /* Hidden file input */
        .file-input {
            display: none;
        }

        /* Scrollbar styling */
        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background-color: hsl(var(--card));
        }

        .messages-container::-webkit-scrollbar-thumb {
            background-color: hsl(var(--border));
            border-radius: 4px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background-color: hsl(var(--muted));
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }

            .message-avatar {
                width: 32px;
                height: 32px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .sidebar {
                display: none;
            }

            .chat-area {
                width: 100%;
            }
        }

        /* Connection overlay */
        .connection-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .connection-overlay.hidden {
            display: none;
        }

        .connection-message {
            background-color: hsl(var(--card));
            border: 1px solid hsl(var(--border));
            padding: 32px;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .connection-message h2 {
            color: hsl(var(--foreground));
            margin-bottom: 16px;
            font-family: var(--font-inter);
            font-weight: 600;
        }

        .connection-message p {
            color: hsl(var(--muted));
            margin-bottom: 24px;
            font-family: var(--font-inter);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid hsl(var(--border));
            border-top-color: hsl(var(--brand));
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="server-name">🔒 Private Chat</div>
            </div>
            
            <div class="connection-status">
                <div class="status-indicator">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">Initializing...</span>
                </div>
            </div>

            <div class="room-info" id="roomInfo" style="display: none;">
                <div class="room-label">Share this link:</div>
                <div class="room-link" id="roomLink"></div>
                <button class="copy-button" id="copyButton">Copy Link</button>
            </div>

            <div class="export-section">
                <button class="export-button" id="exportButton" disabled>Export Chat History</button>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <div>
                    <div class="chat-title">Direct Message</div>
                    <div class="chat-subtitle" id="chatSubtitle">Waiting for connection...</div>
                </div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="system-message">You can start typing immediately. Messages will sync when connected.</div>
            </div>

            <div class="input-area">
                <div class="input-container" id="inputContainer">
                    <button class="image-button" id="imageButton" title="Send Image">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                    </button>
                    <textarea 
                        class="message-input" 
                        id="messageInput" 
                        placeholder="Message your partner..."
                        rows="1"
                    ></textarea>
                    <button class="send-button" id="sendButton">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Connection Overlay -->
    <div class="connection-overlay hidden" id="connectionOverlay">
        <div class="connection-message">
            <div class="spinner"></div>
            <h2>Connecting...</h2>
            <p>Establishing secure peer-to-peer connection</p>
        </div>
    </div>

    <!-- Hidden file input -->
    <input type="file" class="file-input" id="fileInput" accept="image/*">

    <script>
        // State
        let peer = null;
        let conn = null;
        let messages = [];
        let isHost = false;
        let myPeerId = null;
        let myUserId = null;
        let queuedMessages = [];
        let isConnected = false;

        // DOM Elements
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const roomInfo = document.getElementById('roomInfo');
        const roomLink = document.getElementById('roomLink');
        const copyButton = document.getElementById('copyButton');
        const exportButton = document.getElementById('exportButton');
        const messagesContainer = document.getElementById('messagesContainer');
        const inputContainer = document.getElementById('inputContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const imageButton = document.getElementById('imageButton');
        const fileInput = document.getElementById('fileInput');
        const connectionOverlay = document.getElementById('connectionOverlay');
        const chatSubtitle = document.getElementById('chatSubtitle');

        // Generate random user ID
        function generateUserId() {
            return 'User ' + Math.floor(Math.random() * 9000 + 1000);
        }

        // Initialize
        function init() {
            // Generate user ID immediately
            myUserId = generateUserId();
            
            // Enable inputs immediately
            enableInputs();
            
            // Show user ID in subtitle
            chatSubtitle.textContent = `You are: ${myUserId}`;
            
            const urlParams = new URLSearchParams(window.location.search);
            const roomId = urlParams.get('room');

            if (roomId) {
                // Peer mode - connecting to host
                isHost = false;
                connectToPeer(roomId);
            } else {
                // Host mode - generate room
                isHost = true;
                createHost();
            }
        }

        // Create host peer
        function createHost() {
            updateStatus('waiting', 'Generating room ID...');
            
            peer = new Peer(null, {
                debug: 2
            });

            peer.on('open', (id) => {
                myPeerId = id;
                const link = `${window.location.origin}${window.location.pathname}?room=${id}`;
                roomLink.textContent = link;
                roomInfo.style.display = 'block';
                updateStatus('waiting', 'Waiting for partner... Share this link!');
                console.log('Host peer created with ID:', id);
            });

            peer.on('connection', (connection) => {
                conn = connection;
                setupConnection();
            });

            peer.on('error', (err) => {
                console.error('Peer error:', err);
                updateStatus('error', `Connection error: ${err.type}`);
                addSystemMessage(`Connection error: ${err.type}. Check console for details.`);
            });
        }

        // Connect to host peer
        function connectToPeer(peerId) {
            updateStatus('connecting', 'Connecting to host...');
            connectionOverlay.classList.remove('hidden');

            peer = new Peer(null, {
                debug: 2
            });

            peer.on('open', (id) => {
                myPeerId = id;
                console.log('Peer opened with ID:', id, 'Connecting to:', peerId);
                conn = peer.connect(peerId);
                setupConnection();
            });

            peer.on('error', (err) => {
                console.error('Peer error:', err);
                updateStatus('error', `Connection error: ${err.type}`);
                connectionOverlay.classList.add('hidden');
                addSystemMessage(`Connection error: ${err.type}. Check console for details.`);
            });
        }

        // Setup connection handlers
        function setupConnection() {
            // Set connection timeout
            const connectionTimeout = setTimeout(() => {
                if (!isConnected) {
                    updateStatus('error', 'Connection timeout');
                    connectionOverlay.classList.add('hidden');
                    addSystemMessage('Connection timed out. The peer may be offline or the link is invalid.');
                }
            }, 15000); // 15 second timeout

            conn.on('open', () => {
                clearTimeout(connectionTimeout);
                isConnected = true;
                updateStatus('connected', '🔴 Connected & Live!');
                connectionOverlay.classList.add('hidden');
                exportButton.disabled = false;
                
                if (isHost) {
                    chatSubtitle.textContent = `Partner connected | You are: ${myUserId}`;
                } else {
                    chatSubtitle.textContent = `Connected to host | You are: ${myUserId}`;
                }

                addSystemMessage('Connection established! Real-time sync active.');
                
                // Send queued messages
                if (queuedMessages.length > 0) {
                    addSystemMessage(`Sending ${queuedMessages.length} queued message(s)...`);
                    queuedMessages.forEach(msg => {
                        conn.send(msg);
                    });
                    queuedMessages = [];
                }
            });

            conn.on('data', (data) => {
                handleIncomingMessage(data);
            });

            conn.on('close', () => {
                clearTimeout(connectionTimeout);
                isConnected = false;
                updateStatus('error', 'Partner disconnected');
                addSystemMessage('Partner has disconnected. You can continue typing - messages will queue.');
            });

            conn.on('error', (err) => {
                clearTimeout(connectionTimeout);
                console.error('Connection error:', err);
                updateStatus('error', 'Connection error');
                addSystemMessage(`Connection error: ${err.type}. You can continue typing.`);
            });
        }

        // Update connection status
        function updateStatus(status, text) {
            statusDot.className = 'status-dot';
            statusText.textContent = text;

            switch (status) {
                case 'connected':
                    statusDot.classList.add('connected');
                    break;
                case 'waiting':
                    statusDot.classList.add('waiting');
                    break;
                case 'error':
                    statusDot.classList.add('error');
                    break;
            }
        }

        // Enable chat inputs
        function enableInputs() {
            inputContainer.classList.remove('disabled');
            messageInput.disabled = false;
            sendButton.disabled = false;
            imageButton.disabled = false;
            messageInput.focus();
        }

        // Disable chat inputs
        function disableInputs() {
            inputContainer.classList.add('disabled');
            messageInput.disabled = true;
            sendButton.disabled = true;
            imageButton.disabled = true;
        }

        // Handle incoming message
        function handleIncomingMessage(data) {
            messages.push(data);
            renderMessage(data, false);
            scrollToBottom();
        }

        // Send message
        function sendMessage(content, type = 'text') {
            const message = {
                id: Date.now(),
                content: content,
                type: type,
                sender: myUserId,
                timestamp: new Date().toISOString()
            };

            messages.push(message);
            renderMessage(message, true);
            scrollToBottom();

            // Send if connected, otherwise queue
            if (isConnected && conn && conn.open) {
                conn.send(message);
            } else {
                queuedMessages.push(message);
                if (!isConnected) {
                    addSystemMessage('Message queued - will send when connected');
                }
            }
        }

        // Render message
        function renderMessage(message, isMine) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            // Extract number from user ID (e.g., "User 1234" -> "1234")
            const userNumber = message.sender.replace('User ', '');
            avatar.textContent = userNumber;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            const headerDiv = document.createElement('div');
            headerDiv.className = 'message-header';

            const author = document.createElement('span');
            author.className = 'message-author';
            author.textContent = message.sender;

            const timestamp = document.createElement('span');
            timestamp.className = 'message-timestamp';
            timestamp.textContent = formatTime(message.timestamp);

            headerDiv.appendChild(author);
            headerDiv.appendChild(timestamp);

            const textDiv = document.createElement('div');
            textDiv.className = 'message-text';

            if (message.type === 'image') {
                const img = document.createElement('img');
                img.className = 'message-image';
                img.src = message.content;
                img.alt = 'Shared image';
                img.onclick = () => window.open(message.content, '_blank');
                textDiv.appendChild(img);
            } else {
                textDiv.textContent = message.content;
            }

            contentDiv.appendChild(headerDiv);
            contentDiv.appendChild(textDiv);

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);

            messagesContainer.appendChild(messageDiv);
        }

        // Add system message
        function addSystemMessage(text) {
            const systemDiv = document.createElement('div');
            systemDiv.className = 'system-message';
            systemDiv.textContent = text;
            messagesContainer.appendChild(systemDiv);
            scrollToBottom();
        }

        // Format time
        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Scroll to bottom
        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Copy room link
        copyButton.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(roomLink.textContent);
                copyButton.textContent = 'Copied!';
                setTimeout(() => {
                    copyButton.textContent = 'Copy Link';
                }, 2000);
            } catch (err) {
                console.error('Failed to copy:', err);
            }
        });

        // Send text message
        sendButton.addEventListener('click', () => {
            const content = messageInput.value.trim();
            if (content) {
                sendMessage(content, 'text');
                messageInput.value = '';
                messageInput.style.height = 'auto';
            }
        });

        // Send on Enter (Shift+Enter for new line)
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendButton.click();
            }
        });

        // Auto-resize textarea
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = messageInput.scrollHeight + 'px';
        });

        // Image upload
        imageButton.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const base64 = event.target.result;
                    sendMessage(base64, 'image');
                };
                reader.readAsDataURL(file);
                fileInput.value = '';
            }
        });

        // Export chat history
        exportButton.addEventListener('click', () => {
            if (messages.length === 0) {
                alert('No messages to export');
                return;
            }

            const htmlContent = generateExportHTML();
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `chat-export-${new Date().toISOString().slice(0, 10)}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // Generate export HTML
        function generateExportHTML() {
            let html = `
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Export - ${new Date().toLocaleDateString()}</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: hsl(222.2 84% 4.9%);
            color: hsl(210 40% 98%);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid hsl(217.2 32.6% 17.5%);
        }
        .message {
            margin-bottom: 20px;
            padding: 15px;
            background-color: hsl(215 27.9% 16.9%);
            border: 1px solid hsl(217.2 32.6% 17.5%);
            border-radius: 8px;
        }
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: hsl(210 40% 98%);
            font-weight: 500;
        }
        .message-content {
            font-size: 16px;
            line-height: 1.5;
        }
        .message-image {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid hsl(217.2 32.6% 17.5%);
        }
        .system-message {
            text-align: center;
            color: hsl(215 27.9% 16.9%);
            font-style: italic;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Chat Export</h1>
        <p>Date: ${new Date().toLocaleString()}</p>
        <p>Total Messages: ${messages.length}</p>
    </div>
`;

            messages.forEach(msg => {
                if (msg.type === 'image') {
                    html += `
    <div class="message">
        <div class="message-header">
            <span>${msg.sender === 'me' ? 'You' : 'Partner'}</span>
            <span>${formatTime(msg.timestamp)}</span>
        </div>
        <div class="message-content">
            <img class="message-image" src="${msg.content}" alt="Shared image">
        </div>
    </div>`;
                } else {
                    html += `
    <div class="message">
        <div class="message-header">
            <span>${msg.sender === 'me' ? 'You' : 'Partner'}</span>
            <span>${formatTime(msg.timestamp)}</span>
        </div>
        <div class="message-content">
            ${escapeHtml(msg.content)}
        </div>
    </div>`;
                }
            });

            html += `
</body>
</html>`;

            return html;
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Start the app
        init();
    </script>
</body>
</html>
