<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Chat...</title>
    <script>
        // Get room parameter from URL
        const urlParams = new URLSearchParams(window.location.search);
        const room = urlParams.get('room');

        // Redirect to cosmic-ui-improvements with the same room
        if (room) {
            window.location.href = `https://cosmic-ui-improvements.vercel.app/p2p-chat.html?room=${room}`;
        } else {
            // If no room parameter, redirect without it
            window.location.href = 'https://cosmic-ui-improvements.vercel.app/p2p-chat.html';
        }
    </script>
</head>
<body>
    <p>Redirecting to chat...</p>
</body>
</html>
