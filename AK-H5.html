# Hoofdstuk 5 - Gewapende conflicten

## Paragraaf 5.1 – Wapengeweld wereldwijd

**5.1.1 Je weet waar gewapende conflicten in de wereld voorkomen.**

* **Definitie:** Er is sprake van een gewapend conflict als er bij aanhoudende strijd ten minste **25 doden per jaar** vallen.
* **Locaties:** Conflicten komen wereldwijd voor, maar de hoogste concentraties bevinden zich in **sub-Sahara Afrika, Zuidoost-Azië en de islamitische wereld**. Ook de westerse wereld is vaak betrokken bij deze conflicten.
* **Typen conflicten:**

  * **Internationaal (interstatelijk):** Strijd tussen twee of meer landen (bijv. de Tweede Wereldoorlog).
  * **Binnenlands (intrastatelijk):** Strijd binnen de grenzen van één land tussen groepen of tegen de regering.
  * **Transnationaal (regionaal):** Een binnenlands conflict dat de grens overgaat en buurlanden destabiliseert (bijv. Rwanda en het Grote Merengebied).
  * **Geïnternationaliseerd:** Een binnenlands conflict waarbij buitenlandse mogendheden zich mengen (bijv. Syrië, waar o.a. de VS, Rusland en Iran betrokken raakten).

**5.1.2 Je begrijpt hoe grenzen ontstaan en kunnen veranderen.**

* **Soevereiniteit:** Een staat is een gebied met een internationaal erkende grens en een eigen bestuur dat zelf de macht uitoefent zonder inmenging van buitenaf.
* **Naties versus Staten:** Een **volk of natie** deelt dezelfde etniciteit (taal, geloof, geschiedenis). Wanneer een volk in zijn eigen staat woont, spreken we van een **natiestaat**. Omdat er 5.000 volken zijn en slechts 200 staten, lukt natievorming vaak niet, wat tot spanningen leidt.
* **Grenzen ter discussie:** Grenzen zijn mensenwerk en kunnen veranderen door:

  * **Dekolonisatie:** In de Arabische wereld worden grenzen die door koloniale machten zijn getrokken vaak betwist.
  * **Separatisme en Autonomie:** Volken kunnen onafhankelijkheid eisen (**separatisme**, zoals in Nigeria) of een mate van zelfbestuur (**autonomie**, zoals in Baluchistan).
  * **Historische gronden:** Landen kunnen hun gebied willen uitbreiden op basis van het verleden (bijv. Rusland).

**5.1.3 Je kunt met behulp van kaarten en andere gegevens uitleggen hoe gewapende conflicten over landsgrenzen ontstaan.**

* **Geopolitiek:** Landen gebruiken politieke of militaire middelen om macht en invloed in een regio te vergroten. Rivaliteit tussen grootmachten (zoals de VS en China rondom Taiwan) kan leiden tot spanningen over grenzen.
* **Ideologie zonder grenzen:** Het **jihadisme** streeft naar een islamitische staat zonder landsgrenzen, wat conflicten over grote gebieden verspreidt.
* **Territoriale geschillen:** Conflicten ontstaan vaak op de grenzen van verschillende territoria of waar grondstoffen (zoals in de Perzische Golf) de inzet zijn van strijd tussen buurlanden.

---

## Paragraaf 5.2 – Oorzaken van gewapende conflicten

**5.2.1 Je weet welke oorzaken van gewapende conflicten er zijn.**

* **Historisch/Cultureel:** Grenzen uit de koloniale tijd waarbij de ene groep (bijv. Tutsi’s in Rwanda) werd bevoordeeld boven de andere (Hutu’s).
* **Economisch:** De **paradox van de overvloed (*resource curse*)** houdt in dat de aanwezigheid van waardevolle grondstoffen de kans op conflict vergroot omdat de bevolking niet profiteert terwijl het milieu vervuild raakt (bijv. Nigeria, Peru).
* **Demografisch:** Een **jeugdbult** (veel 15- tot 29-jarigen) in combinatie met hoge werkloosheid kan leiden tot frustratie en verzet tegen de machthebbers.

**5.2.2 Je kunt uitleggen wat gebieden kwetsbaar maakt voor escalatie van conflicten.**

* **Multipliers:** Factoren die een bestaande slechte situatie verergeren tot een gewapend conflict.

  * **Klimaatverandering:** Zorgt voor droogte en voedseltekorten, wat de ongelijkheid vergroot.
  * **Pandemieën:** Epidemieën treffen de armsten het hardst en kunnen leiden tot wantrouwen tegen de overheid door desinformatie.
* **Sneeuwbaleffect:** In arme gebieden zonder reserves leiden deze factoren sneller tot een gewapende strijd door rebellengroepen.

**5.2.3 Je begrijpt welke rol de overheid kan spelen in het uitbreken van conflicten en het tot stand brengen van vrede.**

* **Fragile States:** Een staat waar de overheid vrijwel geen controle heeft en waar corruptie en chaos heersen (bijv. Sudan). De **Fragile States Index** meet deze kwetsbaarheid op basis van sociale, politieke en economische factoren.
* **Bestuursvormen:** Een **dictatuur** (macht bij één persoon/groep) kan tijdelijk stabiel lijken, maar onderdrukt vaak minderheden, wat op termijn tot geweld leidt.
* **Gouden regels voor vrede:** Factoren zoals persvrijheid, onafhankelijke rechtspraak en een doelmatige overheid bevorderen de vrede.

---

## Paragraaf 5.3 – Gevolgen van gewapende conflicten

**5.3.1 Je weet welke sociale gevolgen gewapende conflicten kunnen hebben.**

* **Humanitaire rampen:** Doelbewuste tactieken zoals het bombarderen van scholen, blokkeren van voedselhulp en massaverkrachtingen leiden tot enorme ellende.
* **Gezondheid:** Oorlog vernietigt de zorg (geen vaccins), veroorzaakt fysiek letsel en leidt tot generatielange psychische trauma’s.
* **Vluchtelingen:** Mensen vluchten voor geweld. Een **ontheemde** blijft in eigen land; een **vluchteling** steekt een grens over. Asielzoekers in de EU vormen slechts een fractie (5%) van alle gevluchte mensen wereldwijd.

**5.3.2 Je begrijpt hoe de economische gevolgen van gewapende conflicten twee kanten op werken.**

* **Negatief:** Oorlog verlamt de economie: akkers blijven braak, fabrieken stoppen, toeristen en investeerders blijven weg, en infrastructuur (wegen, bruggen) wordt verwoest. De kosten voor wederopbouw zijn gigantisch.
* **Positief (handelaren):** Er wordt geld verdiend aan de illegale handel in drugs, diamanten en olie om de strijd te financieren. Wapenproducenten maken grote winsten bij toenemende spanningen.

**5.3.3 Je kunt uit een bevolkingsgrafiek informatie halen over gewapende conflicten in het verleden.**

* **Conflict-inkeping:** Een gewapend conflict is in een bevolkingspiramide te herkennen aan een diepe inkeping door een hoog sterftecijfer en een laag geboortecijfer tijdens de oorlog (bijv. Cambodja 1975-1979).
* **Babyboom:** Na een conflict volgt vaak een **geboortegolf** (uitstulping in de grafiek), omdat mensen weer hoop hebben op de toekomst.
* **Genocide:** De moedwillige vernietiging van een bevolkingsgroep (bijv. Rwanda, Srebrenica, Rohingya) laat diepe sporen na in de demografische opbouw.

## Paragraaf 5.4 – Hoe rustig is Europa?

**5.4.1 Je weet het politieke verschil tussen Europese landen en EU-lidstaten.**

* **Europa versus EU:** Europa is een werelddeel (tot aan de Oeral); de EU is een politieke unie van lidstaten.
* **Rechtsstaat:** EU-lidstaten moeten een democratische **rechtsstaat** zijn, waar minderheden beschermd worden en de overheid gecontroleerd wordt door onafhankelijke rechters.

**5.4.2 Je begrijpt waar en waarom in Europa gewapende conflicten waren.**

* **Etnische en religieuze strijd:** Conflicten vonden plaats in **Noord-Ierland** (katholieken vs. protestanten), **Baskenland** (strijd voor autonomie onder de dictatuur van Franco) en **voormalig Joegoslavië** (etnische conflicten na de dood van Tito).
* **Oorzaken:** Vaak liggen onderdrukking van minderheden of het streven naar separatisme (zoals in Catalonië) aan de basis van Europese spanningen.

**5.4.3 Je kunt huidige en mogelijke toekomstige conflictgebieden in Europa op een kaart aanwijzen.**

* **Russische agressie:** De invasie van Oekraïne en eerdere aanvallen op Georgië zorgen voor angst in de Baltische staten (Estland, Letland, Litouwen), die grote Russische minderheden hebben.
* **Hybride oorlog:** Strijd via hacking, trollen en nepnieuws om de samenleving te destabiliseren. Ook het inzetten van migratie als wapen bij de grens met Belarus valt hieronder.
* **Interne dreigingen:** De EU heeft te maken met georganiseerde misdaad (drugsmaffia), jihadisme en rechts-extremisme.

---

## Paragraaf 5.5 – Nederland: oorlog en vrede

**5.5.1 Je weet dat Nederland in het verleden gewapende conflicten heeft veroorzaakt en bezet is geweest.**

* **Onafhankelijkheidsstrijd:** Nederland werd zelf onafhankelijk van Spanje na de Tachtigjarige Oorlog (1568-1648).
* **Koloniaal geweld:** Nederland was eeuwenlang de bezetter van Indonesië. Na 1945 probeerde Nederland de Indonesische onafhankelijkheid te voorkomen met geweld, de zogenaamde **Politionele Acties**. Pas in 1949 werd de onafhankelijkheid erkend.

**5.5.2 Je begrijpt welke politieke belangen Nederland heeft in gewapende conflicten.**

* **Vredesmissies:** Nederland neemt deel aan **vredesoperaties** van de VN om humanitaire redenen, maar ook uit eigenbelang (toegang tot grondstoffen, imago, training militairen).
* **Internationaal recht:** Nederland huisvest het **Internationaal Strafhof** in Den Haag, waar oorlogsmisdaden worden berecht.
* **VN-Veiligheidsraad:** Deze raad beslist over missies, maar wordt vaak gehinderd door het **vetorecht** van de permanente leden (VS, Rusland, China, Frankrijk, VK).

**5.5.3 Je begrijpt welke economische belangen Nederland heeft in gewapende conflicten.**

* **Wapenhandel:** Nederland is een belangrijke exporteur van hightech wapenonderdelen.
* **Dilemma:** Hoewel er vergunningen nodig zijn en er niet aan mensenrechtenschenders geleverd mag worden, worden er toch wapens gestuurd naar landen als Egypte, Pakistan en Israël. De handel levert veel geld en werkgelegenheid op, wat soms botst met humanitaire idealen.
