# Hoofdstuk 9 – Functies en algebra

## 9.1 Wortelfuncties

### Theorie: Wortelfunctie
Een functie waarin de variabele onder het wortelteken staat, noem je een **wortelfunctie**. De functie \\( f(x) = \sqrt{x} \\) geeft dus alleen uitkomsten als \\( x \\) groter dan of gelijk aan nul is. Je noteert dit als \\( x \geq 0 \\).

### Vaardigheid: Coördinaten van een randpunt berekenen
Je kunt de coördinaten van een randpunt berekenen.

**Stappenplan:**
1. Stel de uitdrukking onder het wortelteken gelijk aan 0.
2. Bereken de \\( x \\)-coördinaat van het randpunt door de ontstane vergelijking op te lossen.
3. Bereken de \\( y \\)-coördinaat van het randpunt door de gevonden \\( x \\)-coördinaat in de functie in te vullen.
4. Schrijf de coördinaten van het randpunt op.

### Voorbeeld
Gegeven is \\( f(x) = 2 - \sqrt{18 - 6x} \\). Bereken de coördinaten van het randpunt.

**Oplossing:**
1. \\( 18 - 6x = 0 \\)
2. \\( 6x = 18 \rightarrow x = 3 \\)
3. \\( f(3) = 2 - \sqrt{0} = 2 \\)
4. Het randpunt is \\( (3, 2) \\).

---

## 9.2 Rekenen met wortels

### Vaardigheid: Rekenen met wortels waarin variabelen voorkomen
Je kunt rekenen met wortels waarin variabelen voorkomen.

**Rekenregels:**
- \\( \sqrt{a} \cdot \sqrt{b} = \sqrt{ab} \\)
- \\( \frac{\sqrt{a}}{\sqrt{b}} = \sqrt{\frac{a}{b}} \\) (met \\( b \neq 0 \\))

Wortels kun je altijd met elkaar vermenigvuldigen of door elkaar delen. Wortels bij elkaar optellen of van elkaar aftrekken kan alleen als onder de worteltekens precies hetzelfde staat.

### Voorbeeld
Schrijf zo kort mogelijk.
- \\( 6\sqrt{3a} + 2\sqrt{3a} = 8\sqrt{3a} \\)
- \\( \sqrt{5x} \cdot \sqrt{3y} = \sqrt{15xy} \\)
- \\( 3\sqrt{5b} + 2\sqrt{7a} \\) kan niet korter
- \\( 3\sqrt{5b} \cdot 2\sqrt{7a} = 6\sqrt{35ab} \\)

Schrijf als één wortel.
- \\( 7\sqrt{5} = \sqrt{49} \cdot \sqrt{5} = \sqrt{245} \\)
- \\( \frac{\sqrt{65a^2b}}{\sqrt{5ab}} = \sqrt{\frac{65a^2b}{5ab}} = \sqrt{13a} \\)

---

## 9.3 Gebroken functies

### Theorie: Gebroken functie
Een functie waarbij de variabele in de noemer staat, heet een **gebroken functie**. Bij de gebroken functie \\( f(x) = \frac{2}{x} \\) bestaan er alleen functiewaarden als \\( x \neq 0 \\).

### Theorie: Hyperbool, horizontale en verticale asymptoot
De grafiek van de gebroken functie \\( f(x) = \frac{2}{x} \\) wordt een **hyperbool** genoemd. Op den duur komt de grafiek van \\( f \\) heel dicht bij de \\( x \\)-as, maar bereikt die nooit. De lijn \\( y = 0 \\) is een **horizontale asymptoot**. De grafiek van \\( f \\) heeft ook een **verticale asymptoot**. Bij die lijn hoort de formule \\( x = 0 \\).

**Afbeelding – Hyperbool \\( f(x) = \frac{2}{x} \\)**
- Type beeld: Grafiek met twee takken
- Beschrijving: 
  - Eén tak in het eerste kwadrant (rechtsboven) die daalt van linksboven naar rechtsonder
  - Eén tak in het derde kwadrant (linksonder) die stijgt van linksonder naar rechtsboven
  - De \\( y \\)-as is de verticale asymptoot
  - De \\( x \\)-as is de horizontale asymptoot

### Vaardigheid: Omgekeerd evenredig verband herkennen
Je kunt een omgekeerd evenredig verband herkennen. Bij een omgekeerd evenredig verband tussen de variabelen \\( x \\) en \\( y \\) is het product van \\( x \\) en \\( y \\) telkens hetzelfde.

Bijpassende formules zijn:
- \\( x \times y = c \\)
- \\( y = \frac{c}{x} \\)
- \\( x = \frac{c}{y} \\)

### Voorbeeld
Van een rechthoek met lengte \\( l \\) en breedte \\( b \\) is de oppervlakte 48. Voor het verband tussen \\( l \\) en \\( b \\) geldt \\( l \times b = 48 \\), dus \\( l \\) en \\( b \\) zijn omgekeerd evenredig. Voor het verband tussen \\( l \\) en \\( b \\) gelden ook de formules \\( b = \frac{48}{l} \\) en \\( l = \frac{48}{b} \\).

---

## 9.4 Rekenen met breuken

### Vaardigheid: Rekenen met breuken waarin variabelen voorkomen
Je kunt rekenen met breuken waarin variabelen voorkomen.

**Optellen:**
Om breuken te kunnen optellen of aftrekken, moeten de noemers gelijk zijn. Als dat niet het geval is, moet je ze eerst gelijknamig maken.

**Vermenigvuldigen:**
Bij het vermenigvuldigen van breuken vermenigvuldig je de teller met de teller en de noemer met de noemer.

**Vereenvoudigen:**
Breuken kun je vereenvoudigen door de teller en de noemer door hetzelfde getal te delen. Als er variabelen in de breuk staan, gaat dat op dezelfde manier.

### Voorbeeld
Optellen:
\\( \frac{1}{3a} + \frac{7}{11a} = \frac{11}{33a} + \frac{21}{33a} = \frac{32}{33a} \\)

Vermenigvuldigen:
\\( \frac{2a}{3b} \cdot \frac{5a}{7} = \frac{10a^2}{21b} \\)

Vereenvoudigen:
\\( \frac{45a^3}{81a^5} = \frac{5}{9a^2} \\)

---

## 9.5 Machtsfuncties

### Theorie: Machtsfunctie
Een functie van de vorm \\( f(x) = a \cdot x^n \\) noem je een **machtsfunctie**. Bij een machtsfunctie is het grondtal van de macht een variabele.

### Theorie: Machtsfunctie met even of oneven exponent
Van machtsfuncties met een even exponent zoals \\( f(x) = x^2 \\), \\( g(x) = x^4 \\) en \\( h(x) = x^6 \\) heeft de grafiek een top, net als een parabool.

Van machtsfuncties met een oneven exponent zoals \\( k(x) = x^3 \\), \\( l(x) = x^5 \\) en \\( m(x) = x^7 \\) heeft de grafiek geen top.

**Afbeelding – Machtsfuncties**
- Type beeld: Twee grafieken naast elkaar
- Linker grafiek: \\( f(x) = x^n \\), \\( n \\) oneven – S-vormige kromme door de oorsprong
- Rechter grafiek: \\( f(x) = x^n \\), \\( n \\) even – U-vormige parabool met top in de oorsprong

---

## 9.6 Rekenen met machten

### Vaardigheid: Rekenen met machten waarin variabelen voorkomen
Je kunt rekenen met machten waarin variabelen voorkomen.

**Rekenregels:**
- \\( (a \cdot b)^n = a^n \cdot b^n \\)
- \\( \left(\frac{a}{b}\right)^n = \frac{a^n}{b^n} \\) (Hierin is \\( b \neq 0 \\))

Voor het zonder haakjes schrijven van \\( (a+b)^2 \\) kun je gebruik maken van een vermenigvuldigtabel.

### Voorbeeld
Schrijf zonder haakjes.
- \\( (2p^2q)^4 = 2^4 \cdot (p^2)^4 \cdot q^4 = 16p^8q^4 \\)
- \\( (4p+3)^2 = 16p^2 + 12p + 12p + 9 = 16p^2 + 24p + 9 \\)
- \\( \left(\frac{4a}{7b^2}\right)^3 = \frac{(4a)^3}{(7b^2)^3} = \frac{4^3 \cdot a^3}{7^3 \cdot (b^2)^3} = \frac{64a^3}{343b^6} \\)
