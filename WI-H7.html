## Samenvatting

### Vaardigheid

**Je kunt bij een functie de parabool schetsen.**

Bij het schetsen van een parabool maak je eerst uit het functievoorschrift enkele kenmerken van de parabool op.

- Uit de waarde van \\( a \\) kun je opmaken of de grafiek een bergparabool of een dalparabool is.
- Uit de vorm \\( f(x) = a(x - s)(x - t) \\) kun je opmaken in welke punten de grafiek van \\( f \\) de x-as snijdt. Met deze snijpunten kun je opmaken of de top van de grafiek van \\( f \\) links of rechts van de y-as ligt.
- Uit de vorm \\( f(x) = a(x - p)^2 + q \\) kun je opmaken welk punt de top van de grafiek van \\( f \\) is.
- Uit de vorm \\( f(x) = ax^2 + bx + c \\) kun je opmaken welk punt het snijpunt van de grafiek van \\( f \\) met de y-as is.
- Uit \\( f(0) \\) kun je opmaken welke coördinaten het snijpunt van de grafiek van \\( f \\) met de y-as heeft.

---

### Voorbeeld

Schets de grafieken bij de functies \\( f(x) = -3(x - 1)(x + 7) \\), \\( g(x) = 4(x - 1)^2 - 16 \\) en \\( h(x) = x^2 + 4x + 5 \\).

**Oplossing**

- De grafiek van \\( f \\) is een bergparabool, want \\( a = -3 \\).
- De punten \\( (1, 0) \\) en \\( (-7, 0) \\) zijn de snijpunten van de grafiek van \\( f \\) met de x-as.
- De top van de grafiek van \\( f \\) ligt links van de y-as.
- Omdat \\( f(0) = 21 \\), zijn de coördinaten van het snijpunt van de grafiek van \\( f \\) met de y-as \\( (0, 21) \\).
- De grafiek van \\( g \\) is een dalparabool, want \\( a = 4 \\).
- Het punt \\( (1, -16) \\) is de top van de grafiek van \\( g \\).
- Omdat \\( g(0) = -12 \\), zijn de coördinaten van het snijpunt van de grafiek van \\( g \\) met de y-as \\( (0, -12) \\).
- De grafiek van \\( h \\) is een dalparabool, want \\( a = 1 \\).
- Het punt \\( (0, 5) \\) is het snijpunt van de grafiek van \\( h \\) met de y-as.
- Met kwadraat afsplitsen kun je het functievoorschrift van \\( h \\) herleiden tot \\( h(x) = (x + 2)^2 + 1 \\).
- Het punt \\( (-2, 1) \\) is de top van de grafiek van \\( h \\).

**Grafieken bij het voorbeeld:**

**Afbeelding – Grafieken f, g en h**
- Type beeld: Drie parabolen in één assenstelsel
- Grafiek f (blauw): Bergparabool met top links van de y-as, snijdt x-as bij \\( (-7, 0) \\) en \\( (1, 0) \\), snijdt y-as bij \\( (0, 21) \\)
- Grafiek g (oranje): Dalparabool met top bij \\( (1, -16) \\), snijdt y-as bij \\( (0, -12) \\)
- Grafiek h (groen): Dalparabool met top bij \\( (-2, 1) \\), snijdt y-as bij \\( (0, 5) \\)

### Vaardigheid

**Je kunt kwadratische vormen herleiden.**

Door het functievoorschrift bij een parabool te herleiden, kun je het functievoorschrift in meer vormen schrijven.

Uit elke vorm kun je herkenbare punten van de parabool opmaken.

- Bij de vorm \\( f(x) = ax^2 + bx + c \\) is het punt \\( (0, c) \\) het snijpunt van de grafiek van \\( f \\) met de y-as.
- Bij de vorm \\( f(x) = a(x - s)(x - t) \\) zijn de punten \\( (s, 0) \\) en \\( (t, 0) \\) de snijpunten van de grafiek van \\( f \\) met de x-as.
- Bij de vorm \\( f(x) = a(x - p)^2 + q \\) is het punt \\( (p, q) \\) de top van de grafiek van \\( f \\).

---

### Voorbeeld

Gegeven is de functie \\( f(x) = (x - 6)^2 - 4 \\).

- Het punt \\( (6, -4) \\) is de top van de grafiek van \\( f \\).
- Met haakjes wegwerken kun je het functievoorschrift van \\( f \\) herleiden tot \\( f(x) = x^2 - 12x + 32 \\).
- Het punt \\( (0, 32) \\) is het snijpunt van de grafiek van \\( f \\) met de y-as.
- Met ontbinden in factoren kun je het functievoorschrift van \\( f \\) herleiden tot \\( f(x) = (x - 4)(x - 8) \\).
- De punten \\( (4, 0) \\) en \\( (8, 0) \\) zijn de snijpunten van de grafiek van \\( f \\) met de x-as.

## Vaardigheid: Functievoorschrift opstellen

**Je kunt het functievoorschrift bij een parabool opstellen.**

> Zijn de coördinaten van de snijpunten van de parabool met de x-as bekend?
> 1. Gebruik de vorm \\( f(x) = a(x - s)(x - t) \\).
> 2. Uit de coördinaten van de snijpunten van de parabool met de x-as volgen de waarden van \\( s \\) en \\( t \\).
> 3. Bereken de waarde van \\( a \\) met behulp van de coördinaten van een derde punt.

> Zijn de coördinaten van de top van de parabool bekend?
> 1. Gebruik de vorm \\( f(x) = a(x - p)^2 + q \\).
> 2. Uit de coördinaten van de top van de parabool volgen de waarden van \\( p \\) en \\( q \\).
> 3. Bereken de waarde van \\( a \\) met behulp van de coördinaten van een tweede punt.

> Zijn de coördinaten van het snijpunt van de parabool met de y-as en twee willekeurige punten bekend?
> 1. Gebruik de vorm \\( f(x) = ax^2 + bx + c \\).
> 2. Uit de coördinaten van het snijpunt van de parabool met de y-as volgt de waarde van \\( c \\).
> 3. Vul de coördinaten van de twee punten in om een stelsel vergelijkingen te maken. Bereken de waarden van \\( a \\) en \\( b \\) door het stelsel vergelijkingen op te lossen.

---

### Voorbeeld

Stel het functievoorschrift bij de parabool op.

**Afbeelding – Parabool f**
- Type beeld: Grafiek van een parabool
- De parabool gaat door de punten \\( (-1, 26) \\) en \\( (3, 2) \\).
- De top is niet direct af te lezen, maar lijkt rechtsboven te liggen.

**Oplossing**

Van de parabool zijn de coördinaten van de top bekend.
1. Gebruik de vorm \\( f(x) = a(x - p)^2 + q \\).
2. Uit de coördinaten van de top van de grafiek van \\( f \\) volgt \\( p = 3 \\) en \\( q = 2 \\).
   Invullen geeft \\( f(x) = a(x - 3)^2 + 2 \\).
3. De coördinaten van het punt \\( (-1, 26) \\) invullen geeft \\( a(-1 - 3)^2 + 2 = 26 \\), oftewel \\( 16a = 24 \\), dus \\( a = 1\frac{1}{2} \\).
   Het functievoorschrift bij de parabool is \\( f(x) = 1\frac{1}{2}(x - 3)^2 + 2 \\).
