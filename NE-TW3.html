*   **Parallellisme:** Herhaling van een bepaalde zinsbouw (niet exact dezelfde woorden).

**Uitleg Paragraaf 3: Grammatica**

**1. Enkelvoudige vs. Samengestelde zin**
*   **Enkelvoudige zin:** Heeft maar **één persoonsvorm**.
    *   *Voorbeeld:* "De kat slaapt op de stoel." (pv = slaapt).
*   **Samengestelde zin:** Heeft **meer dan één persoonsvorm**. Bestaat uit meerdere zinnen die aan elkaar gekoppeld zijn.
    *   *Voorbeeld:* "De kat slaapt op de stoel en de hond ligt op de grond." (pv = slaapt, ligt).
*   **Tip:** Tel de persoonsvormen om het type zin te bepalen.

**2. Nevenschikking vs. Onderschikking**
*   **Nevenschikking:** Twee of meer zinnen/zinsdelen worden **gelijkwaardig** verbonden.
    *   *Voegwoorden:* en, maar, of, want.
    *   *Kenmerk:* Beide zinnen kunnen op zichzelf staan.
    *   *Voorbeeld:* "De zon schijnt en de vogels zingen."
*   **Onderschikking:** Een bijzin is **afhankelijk** van de hoofdzin en kan **niet zelfstandig** staan.
    *   *Voegwoorden:* omdat, hoewel, terwijl, dat.
    *   *Kenmerk:* De bijzin kan niet los staan.
    *   *Voorbeeld:* "Ik ga naar buiten omdat het mooi weer is."
*   **Tip:** Vraag jezelf af: kan de bijzin op zichzelf staan? Nee → onderschikking. Ja → nevenschikking.

**3. Zinsdelen benoemen**
*   **Persoonsvorm (pv):** Werkwoord dat **tijd en persoon** aangeeft. (Vb. speelt)
*   **Onderwerp (ow):** Degene/datgene die iets doet of ondergaat. (Vb. De jongen)
*   **Werkwoordelijk gezegde (wg):** Alle werkwoorden in de zin die iets doen/gebeuren aangeven. (Vb. speelt, rent)
*   **Naamwoordelijk gezegde (ng):** Koppelwerkwoord + naamwoordelijk deel (zn/bn). (Vb. is ziek)
*   **Lijdend voorwerp (lv):** Wie/wat **ondergaat de handeling** van het werkwoord. (Vb. het boek)
*   **Meewerkend voorwerp (mw):** Aan wie/voor wie iets gebeurt. (Vb. de leerling)
*   **Bijwoordelijke bepaling (bwb):** Geeft extra informatie over **tijd, plaats, reden, manier, enz.** (Vb. in de tuin)
---BLOCK_END---

*   **Nevenschikking vs. Onderschikking:** Herkennen van voegwoorden (en, maar, want vs omdat, terwijl, dat) en de test of een zin zelfstandig kan staan.
*   **Effecten Stijlfiguren:** Wat doet parallellisme met het ritme? Wat doet een opsomming (benadrukken)?
*   **Interpreteren:** De definitie van interpreteren en dat gedichten geen eenduidige teksten zijn.

**Waarschijnlijk Niet / Waarschijnlijk Zeker Niet op de Toets**
*   **De specifieke voorbeeldgedichten uit de tekst:** Je hoeft de gedichten van Sylvia Hubers, Menno Wigman, etc. niet uit je hoofd te leren. Je moet wel het *principe* snappen dat in het voorbeeld zit.
*   **Exacte formuleringen:** Zolang de betekenis van de definitie maar klopt, hoef je de tekst niet letterlijk te citeren (behalve de begrippenlijst definities).
*   **Informatie over de dichters:** Specifieke biografische details van de genoemde dichters staan niet in de tekst en komen niet terug.

TITLE: Specifieke Leertips
CONTENT:
**Specifieke Leertips voor dit Onderwerp**

1.  **Maak Flashcards voor Begrippen:**
    *   Maak kaartjes voor: Interpreteren, Beeldspraak, Stijlfiguren, Parallelisme, Opsomming, Antithese, Paradox.
    *   Aan de achterkant: De exacte definitie uit de tekst.
    *   Maak ook kaartjes voor de zinsdelen (pv, ow, wg, ng, lv, mw, bwb) met hun definitie.

2.  **Oefen met Zinnen Analyse:**
    *   Pak willekeurige zinnen uit een boek of tijdschrift.
    *   Oefen het tellen van persoonsvormen (enkelvoudig/samengesteld).
    *   Oefen het benoemen van zinsdelen. Dit is vaardigheidswerk, dit moet je doen om te snappen.

3.  **De 'Zelfstandig Sta'-Test:**
    *   Voor neven- vs onderschikking: Dek de hoofdzin af. Kan het overgebleven stukje nog als zin?
    *   Ja + voegwoord (en/maar) = Nevenschikking.
    *   Nee + voegwoord (omdat/dat) = Onderschikking.

4.  **Verwar Paradox en Antithese niet:**
    *   Antithese = Gewoon tegenstelling (Einde vs Begin).
    *   Paradox = Lijkt onmogelijk/tegenstrijdig, maar is waar (Levend sterven).
    *   Ezelsbruggetje: Para**dox** = **Dox**a (mening/klopt toch). Anti**these** = **Tegen**stelling.

5.  **Gebruik de Tips uit de Tekst:**
    *   De tekst geeft specifieke tips (bijv. "tel de persoonsvormen"). Gebruik deze methodes tijdens de toets expliciet.

    // --- PARSER LOGIC ---

    function parseContent(data) {
        const blocks = data.split('---BLOCK_START---');
        const parsedBlocks = [];

        blocks.forEach(block => {
            if (!block.trim()) return;
            
            // Split by end marker
            const parts = block.split('---BLOCK_END---');
            const contentSection = parts[0];

            // Extract Metadata
            const lines = contentSection.split('\n');
            const meta = {};
            let contentStartIndex = -1;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('ID:')) meta.id = line.replace('ID:', '').trim();
                if (line.startsWith('SECTION:')) meta.section = line.replace('SECTION:', '').trim();
                if (line.startsWith('TYPE:')) meta.type = line.replace('TYPE:', '').trim();
                if (line.startsWith('TITLE:')) meta.title = line.replace('TITLE:', '').trim();
                if (line === 'CONTENT:') {
                    contentStartIndex = i + 1;
                    break;
                }
            }

            // Extract Content
            if (contentStartIndex > -1) {
                meta.content = lines.slice(contentStartIndex).join('\n').trim();
                parsedBlocks.push(meta);
            }
        });
        return parsedBlocks;
    }

    // --- RENDER LOGIC ---

    function formatText(text) {
        // Simple Markdown-like parser for bold and lists
        let html = text
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') // Bold
            .replace(/\n/g, '<br>'); // Newlines

        // Handle Lists (very basic detection)
        html = html.replace(/^\* (.*?)(?=<br>|$)/gm, '<li>$1</li>');
        html = html.replace(/<li>(.*?)<\/li>/g, '<ul><li>$1</li></ul>'); // Wrap in UL (imperfect but works for simple lists)
        
        // Clean up multiple ULs if adjacent (simple fix)
        html = html.replace(/<\/ul><br><ul>/g, '');

        return html;
    }

    function getPriorityBadge(section, type) {
        // Logic based on Block 401 analysis
        // High: Stijlfiguren definities, Zinsdelen, Enkelvoud/Samengesteld
        // Med: Neven/Onderschikking, Effecten Stijlfiguren, Interpreteren
        // Low: Specifieke gedichten, biografie
        
        if (section.includes('Stijlfiguren') && type === 'Samenvatting') return 'badge-high';
        if (section.includes('Grammatica') && type === 'Samenvatting') return 'badge-high';
        if (section.includes('Grammatica') && type === 'Oefenvragen') return 'badge-high';
        if (section.includes('Stijlfiguren') && type === 'Oefenvragen') return 'badge-high';
        
        if (section.includes('Interpreteren')) return 'badge-med';
        if (section.includes('Grammatica') && type === 'Uitleg') return 'badge-med';
        
        return 'badge-low'; // Default fallback
    }

    function createCard(block) {
        const priorityClass = getPriorityBadge(block.section, block.type);
        const isQuestion = block.type === 'Oefenvragen' || block.type === 'Toets';
        const isAnswer = block.type === 'Antwoordmodel';
        
        let contentHtml = formatText(block.content);

        // Active Recall Logic: Hide answers for questions
        if (isQuestion) {
            contentHtml = `
                <div class="spoiler-container">
                    <div>${contentHtml}</div>
                    <button class="spoiler-btn" onclick="toggleSpoiler(this)">Toon Antwoorden / Uitleg</button>
                    <div class="spoiler-content">
                        <em>(Klik op de bijbehorende antwoordmodel sectie hieronder voor de uitwerking)</em>
                    </div>
                </div>
            `;
        }

        // For answer models, we just display them, maybe with a "Check" icon
        let icon = '';
        if(block.type === 'Oefenvragen') icon = '❓';
        if(block.type === 'Antwoordmodel') icon = '✅';
        if(block.type === 'Toets') icon = '📝';
        if(block.type === 'Toetsvoorspelling') icon = '🔮';

        return `
            <div class="card">
                <div class="card-header">
                    <div class="card-title">${icon} ${block.title}</div>
                    <div>
                        <span class="badge ${priorityClass}">${block.type}</span>
                    </div>
                </div>
                <div class="content-area">
                    ${contentHtml}
                </div>
            </div>
        `;
    }

    function renderApp() {
        const blocks = parseContent(rawData);
        const app = document.getElementById('app');
        
        // Group by Section
        const sections = {};
        blocks.forEach(block => {
            if (!sections[block.section]) sections[block.section] = [];
            sections[block.section].push(block);
        });

        // Sort sections logically (Interpreteren -> Stijlfiguren -> Grammatica -> Algemeen -> Toets)
        const sectionOrder = [
            '1. Interpreteren', 
            '2. Stijlfiguren', 
            '3. Grammatica', 
            'Algemeen', 
            'Oefentoets'
        ];

        sectionOrder.forEach(secName => {
            if (sections[secName]) {
                const sectionDiv = document.createElement('div');
                
                // Header
                const header = document.createElement('div');
                header.className = 'section-header';
                header.innerHTML = `<h2>${secName}</h2>`;
                sectionDiv.appendChild(header);

                // Blocks
                sections[secName].forEach(block => {
                    // Special handling: Don't render the raw prediction block (401) as a normal card, 
                    // but use its data to influence badges (already done in logic). 
                    // However, the user might want to SEE the prediction. Let's render it but style it differently.
                    
                    const cardHtml = createCard(block);
                    const cardDiv = document.createElement('div');
                    cardDiv.innerHTML = cardHtml;
                    sectionDiv.appendChild(cardDiv.firstElementChild);
                });

                app.appendChild(sectionDiv);
            }
        });
    }

    // --- INTERACTIVITY ---

    window.toggleSpoiler = function(btn) {
        const content = btn.nextElementSibling;
        content.classList.toggle('visible');
        if (content.classList.contains('visible')) {
            btn.textContent = "Verberg Antwoorden";
            btn.style.backgroundColor = "#475569";
        } else {
            btn.textContent = "Toon Antwoorden / Uitleg";
            btn.style.backgroundColor = "var(--primary)";
        }
    };

    // Initialize
    document.addEventListener('DOMContentLoaded', renderApp);

</script>
