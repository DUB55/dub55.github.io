# 🔄 HERHALING: Hoofdstuk 1 t/m 5

### Hoofdstuk 1: Natuurwetenschappen en onderzoek
*   **Natuurwetenschappen:** Biologie (levende natuur), Natuurkunde (verschijnselen zoals zwaartekracht), Scheikunde (stoffen, atomen, moleculen).
*   **Stofeigenschappen:** Onveranderlijke kenmerken (kookpunt, smeltpunt, dichtheid, etc.). *Vorm is géén stofeigenschap.*
*   **Fasen & Temp:** Solid (s), Liquid (l), Gas (g). Kelvin (K) = °C + 273.
*   **pH:** Zuur (<7), Neutraal (7), Basisch (>7). Verdunnen met water brengt pH richting 7. Neutralisatie: zuur + base → water.
*   **Oplossen:** 
    *   *Oplossing:* helder en doorzichtig.
    *   *Suspensie:* vaste stof zweeft in vloeistof (bezinkt).
    *   *Emulsie:* twee vloeistoffen die niet mengen (bijv. olie en water). *Emulgator* vertraagt ontmengen.
    *   *Hydrofiel:* lost op in water. *Hydrofoob:* lost niet op in water.

### Hoofdstuk 2: Stoffen op microniveau
*   **Atomen & Moleculen:** Atomen zijn de bouwstenen (ca. 100 soorten = elementen). Moleculen zijn bouwwerkjes van atomen.
*   **Element vs Verbinding:** Element = 1 atoomsoort. Verbinding = moleculen met verschillende atoomsoorten.
*   **Twee-atomige moleculen:** H₂, N₂, O₂, F₂, Cl₂, Br₂, I₂.
*   **Naamgeving:** Telwoorden (mono, di, tri...) + uitgang (-oxide, -sulfide, -chloride, etc.). *Let op: 'mono' laat je weg bij het eerste element, behalve bij CO en NO.*
*   **Periodiek Systeem (PS):** Metalen (geleiden stroom, glimmen) vs Niet-metalen. Groepen: Alkalimetalen (1), Aardalkalimetalen (2), Halogenen (17), Edelgassen (18).

### Hoofdstuk 3: Moleculaire stoffen en Zouten
*   **Covalentie:** Aantal bindingen. C=4, N=3, O/S=2, H/F/Cl/Br/I=1. Edelgassen=0.
*   **Atoombouw:** Kern (protonen p⁺, neutronen n⁰). Schillen (elektronen e⁻): K=2, L=8, M=8.
*   **Isotopen:** Zelfde aantal p⁺, maar verschillend aantal n⁰.
*   **Massa:** 1 u = 1,66 × 10⁻²⁴ g. Molecuulmassa is de som van de atoommassa's.
*   **Moleculen:** Bestaan uit niet-metalen. Atoombinding (overlap van schillen).
*   **Zouten:** Bestaan uit ionen (metaal + niet-metaal). Metaal staat e⁻ af (kation, +), niet-metaal neemt e⁻ op (anion, -). *Ionbinding*. Zoutformules hebben **geen** telwoorden!

### Hoofdstuk 4: Reacties en reactievergelijkingen
*   **Wet van Lavoisier:** Massa verdwijnt niet (atomen blijven behouden).
*   **Reactievergelijking:** Beginstoffen → Producten. Toestandsaanduidingen: (s), (l), (g), (aq). *Kloppend maken doe je ALLEEN met coëfficiënten (getallen ervoor), NOOIT met indexen!*
*   **Verbranding & Oxidatie:** Verbranding = reactie met O₂ *met* vuur. Oxidatie = reactie met O₂ *zonder* vuur (langzaam, bijv. roesten). Onvolledige verbranding levert CO of roet (C).
*   **Aantonen:** H₂O (wit kopersulfaat → blauw), CO₂ (kalkwater → troebel), SO₂ (broomwater → kleurloos).

### Hoofdstuk 5: Energie-effecten en rekenen
*   **Energie:** Exotherm (energie komt vrij, producten lager), Endotherm (energie nodig, producten hoger). Activeringsenergie is de energiepiek om de reactie te starten.
*   **Ontleding:** 1 verbinding valt uiteen in meerdere stoffen. *Altijd endotherm.* Types: Fotolyse (licht), Thermolyse (warmte, let op: géén O₂ erbij!), Elektrolyse (elektriciteit).
*   **Rekenen:** Stappenplan: 1. Kloppende reactievergelijking. 2. Massa's in u × coëfficiënt. 3. Gegeven massa's eronder. 4. Kruistabel. 5. Let op overmaat!

# 🚀 NIEUWE STOF (Prioriteit): Hoofdstuk 6 & 7

## Hoofdstuk 6: Mengen en scheiden

### 6.1 Zuivere stoffen en mengsels
*   **Zuivere stof:** Bestaat uit **één molecuulsoort**. Heeft een **scherp smelt- en kookpunt** (de temperatuur blijft *constant* tijdens de faseovergang in een diagram).
*   **Mengsel:** Bestaat uit **meerdere stofsoorten**. Heeft een **smelt- en kooktraject** (de temperatuur blijft *niet* constant, maar blijft stijgen of dalen).

### 6.2 Mengsels maken
Mengsels worden ingedeeld op basis van of ze mengen op microniveau (helder) of macroniveau (niet helder).
*   **Homogeen mengsel:** Stoffen mengen op microniveau. Helder en doorzichtig (kan wel gekleurd zijn).
*   **Heterogeen mengsel:** Stoffen mengen niet op microniveau of hebben verschillende fasen. Niet helder/doorzichtig.

**Tabel 6.1: Namen van mengsels**
| Naam mengsel | Fasen bij elkaar | Gemengd op microniveau? | Homogeen/Heterogeen? |
| :--- | :--- | :--- | :--- |
| **Oplossing** | l + l / l + s / g + g / l + g | ja | homogeen |
| **Emulsie** | l + l | nee | heterogeen |
| **Rook** | g + s | nee | heterogeen |
| **Nevel** | g + l | nee | heterogeen |
| **Suspensie** | l + s | nee | heterogeen |
| **Vaste stof mengsel**| s + s | nee | heterogeen |
| **Schuim** | g + l | nee | heterogeen |

*   **Emulgator:** Zorgt dat een emulsie stabiel blijft. Heeft een **hydrofiele kop** (houdt van water) en een **hydrofobe staart** (houdt van vet). Voorbeeld: eigeel in mayonaise of zeep.

### 6.3 Mengsels scheiden: Scheidingsmethoden
Je scheidt een mengsel door gebruik te maken van het **verschil in stofeigenschappen** van de componenten.

**Tabel 6.3.1: Scheidingsmethoden**
| Scheidingsmethode | Stofeigenschap |
| :--- | :--- |
| **Adsorberen** | Aanhechtingsvermogen (stof hecht aan bijv. Norit. *Let op: je krijgt de stof niet meer terug!*) |
| **Filtreren** | Deeltjesgrootte |
| **Destilleren** | Kookpunt |
| **Extraheren** | Oplosbaarheid |
| **Indampen** | Vluchtigheid |
| **Centrifugeren / bezinken / decanteren** | Dichtheid |
| **Chromatograferen** | Combinatie van oplosbaarheid en aanhechtingsvermogen |

**Chromatografie & Rf-waarde:**
*   **Mobiele fase:** De loopvloeistof die beweegt.
*   **Stationaire fase:** Het papier waar de stof aan hecht.
*   **Rf-waarde:** $\frac{\text{Afstand component}}{\text{Afstand loopvloeistof}}$. De maximale waarde is 1,0.
*   *Hoe hoger de Rf-waarde, hoe beter de stof oplost in de mobiele fase en hoe slechter deze hecht aan de stationaire fase.*

### 6.4 Scheidingsschema's
Om een scheidingsschema te maken, moet je kijken naar de eigenschappen van de stoffen in het mengsel.

**Tabel 6.4: Eigenschappen van verschillende stoffen**
| Stof | Oplosbaar in water | Oplosbaar in alcohol | Oplosbaar in benzine | Kookpunt (°C) | Sublimeerbaar | Adsorb. aan Norit | Oplosbaar in CS₂(l) |
| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |
| **Zand** | --- | --- | --- | >400 | - | --- | --- |
| **Zout** | +++ | --- | --- | >400 | - | --- | --- |
| **Salmiak**| +++ | -- | --- | n.v.t. | + | --- | -- |
| **Suiker** | +++ | --- | + | n.v.t. | - | --- | --- |
| **Jood** | -- | +++ | ++ | n.v.t. | + | -/+ | +++ |
| **Vet** | --- | ++ | +++ | >200 | - | --- | ++ |
| **Aceton** | +++ | +++ | +++ | 52 | - | --- | +++ |
| **Water** | +++ | +++ | --- | 100 | - | --- | --- |
| **Alcohol**| +++ | +++ | +++ | 78 | - | --- | +++ |
| **Kleurstof**| + | +++ | +++ | >400 | - | +++ | +++ |
| **Zwavel** | --- | --- | --- | 80 | - | --- | +++ |
*(Legenda: +++ = zeer goed, ++ = goed, + = matig, -- = slecht, --- = onoplosbaar, n.v.t. = ontleden voordat het kookt)*

#### 📝 Voorbeeldvragen & Uitwerkingen H6
**Vraag 1:** Je verhit een onbekende vaste stof en meet de temperatuur. Tussen 45°C en 52°C blijft de temperatuur niet constant, maar stijgt langzaam door. Is dit een zuivere stof of een mengsel?
*   **Uitwerking:** Dit is een **mengsel**. Een zuivere stof heeft een scherp smeltpunt waarbij de temperatuur *constant* blijft. Een mengsel heeft een smelttraject.

**Vraag 2:** Je hebt een mengsel van zand en keukenzout. Leg uit hoe je deze twee stoffen van elkaar kunt scheiden en noem de scheidingsmethoden.
*   **Uitwerking:** 
    1. Je voegt **water** toe aan het mengsel. Het zout lost op in water (extraheren), het zand niet.
    2. Je **filtreert** het mengsel. Het zand blijft achter op het filter (residu), het zoutwater gaat erdoorheen (filtraat).
    3. Het filtraat (zoutwater) **indamp** je. Het water verdampt (vluchtigheid) en het zout blijft achter.

**Vraag 3:** Bij een chromatografie-experiment is de loopvloeistof 12 cm omhoog gelopen. Een blauwe kleurstof is 4 cm omhoog gelopen. Bereken de Rf-waarde.
*   **Uitwerking:** Rf-waarde = 4 cm / 12 cm = **0,33**.

## Hoofdstuk 7: Koolwaterstoffen

### 7.1 & 7.2 Fossiele brandstoffen en Aardolie
*   **Fossiele brandstoffen:** Steenkool, aardolie, aardgas. Ontstaan uit organisch materiaal onder hoge druk en temperatuur (tijdperk: *Carboon*).
*   **Aardolie:** Een mengsel van koolwaterstoffen.
*   **Gefractioneerd destilleren:** Aardolie wordt gescheiden in fracties op basis van **kookpunt**. Vluchtige stoffen (laag kookpunt) condenseren **bovenin** de destillatietoren. *Dit is géén chemische reactie.*
*   **Kraken:** Een chemische reactie (ontleding) waarbij lange koolstofketens worden gebroken in kortere, nuttigere moleculen. 
    *   *Let op:* Bij het kraken van een verzadigd alkaan ontstaat **altijd minstens één onverzadigd alkeen**, omdat er waterstofatomen "tekort" komen om twee nieuwe alkanen te maken.

### 7.4 Naamgeving koolwaterstoffen en molecuulbouw
*   **Alkanen:** Verzadigde koolwaterstoffen (alleen enkele bindingen).
*   **Algemene formule alkanen:** $C_nH_{2n+2}$
*   **Alkenen:** Dubbele binding, formule $C_nH_{2n}$, achternaam = **-een**.
*   **Alkynen:** Drievoudige binding, achternaam = **-yn**.
*   **Cycloalkanen:** Ringstructuur, voorvoegsel = **cyclo-**.

**Tabel: MEPBPHHOND (Alkanen & Alkylgroepen)**
| n (C-atomen) | Naam Alkaan (Achternaam) | Molecuulformule | Voorvoegsel (Zijketen) |
| :--- | :--- | :--- | :--- |
| 1 | Methaan | CH₄ | methyl- |
| 2 | Ethaan | C₂H₆ | ethyl- |
| 3 | Propaan | C₃H₈ | propyl- |
| 4 | Butaan | C₄H₁₀ | butyl- |
| 5 | Pentaan | C₅H₁₂ | pentyl- |
| 6 | Hexaan | C₆H₁₄ | hexyl- |
| 7 | Heptaan | C₇H₁₆ | heptyl- |
| 8 | Octaan | C₈H₁₈ | octyl- |
| 9 | Nonaan | C₉H₂₀ | nonyl- |
| 10 | Decaan | C₁₀H₂₂ | decyl- |

**Stappenplan Systematische Naamgeving:**
1.  Zoek de **langste koolstofketen**. Dit is de achternaam (bijv. hexaan).
2.  Zoek alle **zijketens** (alkylgroepen, bijv. methyl).
3.  Nummer de hoofdketen zodat de zijketens de **laagste mogelijke nummers (adressen)** krijgen.
4.  Zet de naam in elkaar: *adres-voornaam + achternaam*. 
    *   Gebruik telwoorden (di, tri, tetra) als dezelfde zijketen meerdere keren voorkomt.
    *   Zijketens op **alfabetische volgorde** (ethyl komt vóór methyl).
*   **Isomeren:** Stoffen met dezelfde molecuulformule, maar een andere structuurformule (en dus een andere naam en eigenschappen).

### 7.5 Karakteristieke groepen
Als er andere atomen/groepen aan de keten zitten dan C en H, verandert de naam.

**Tabel: Karakteristieke groepen**
| Groep | Naam | Achtervoegsel | Voorvoegsel | Prioriteit "achternaam" |
| :--- | :--- | :--- | :--- | :--- |
| -CH₃, -C₂H₅, etc. | Alkyl | Geen | Methyl-, ethyl-, etc. | **Geen** (altijd voornaam) |
| -Cl, -Br, -F, -I | Halogeen | Geen | Chloor-, broom-, etc. | **Geen** (altijd voornaam) |
| -NH₂ | Amine | -amine | amino- | **Laag** |
| -OH | Alcohol | -ol | hydroxy- | **Medium** |
| -COOH | Zuur | -zuur | Geen | **Hoogste** |

*Regels voor prioriteit:* De groep met de **hoogste prioriteit** bepaalt de achternaam en krijgt het **laagst mogelijke nummer** bij het nummeren van de keten. Lagere prioriteitgroepen worden voornamen.

#### 📝 Voorbeeldvragen & Uitwerkingen H7
**Vraag 1:** Geef de algemene formule van een alkaan met 8 koolstofatomen en bereken hoeveel waterstofatomen het heeft.
*   **Uitwerking:** De algemene formule is $C_nH_{2n+2}$. Voor n=8: $C_8H_{(2\times8)+2} = C_8H_{18}$. Het heet octaan.

**Vraag 2:** Geef de systematische naam van de volgende structuur: Een keten van 6 C-atomen. Op C2 zit een methylgroep en op C4 zit ook een methylgroep.
*   **Uitwerking:** 
    1. Langste keten = 6 C-atomen = hexaan.
    2. Twee methylgroepen = dimethyl.
    3. Nummeren: van links naar rechts geeft 2 en 4. (Van rechts naar links zou het 3 en 5 zijn, dus 2,4 is lager).
    4. Naam: **2,4-dimethylhexaan**.

**Vraag 3:** Een molecuul heeft een keten van 4 koolstofatomen. Op C1 zit een -OH groep en op C2 zit een -COOH groep. Wat is de correcte achternaam en hoe heet de stof?
*   **Uitwerking:** 
    *   We hebben een alcohol (-OH) en een zuur (-COOH). 
    *   Volgens de tabel heeft **Zuur de hoogste prioriteit**. De achternaam wordt dus **-zuur**.
    *   De -OH groep wordt een voornaam: **hydroxy-**.
    *   We nummeren de keten zodat het zuur het laagste nummer krijgt (dus C1 is het zuur).
    *   De naam is: **2-hydroxybutaanzuur**.

**Vraag 4:** Bij het kraken van dodecaan ($C_{12}H_{26}$) ontstaan twee moleculen. Eén daarvan is octaan ($C_8H_{18}$). Geef de molecuulformule van de andere stof en leg uit wat voor stof dit is.
*   **Uitwerking:** 
    *   Totaal: 12 C en 26 H.
    *   Octaan heeft: 8 C en 18 H.
    *   De andere stof heeft: (12-8)=4 C en (26-18)=8 H. Formule: **$C_4H_8$**.
    *   *Uitleg:* Omdat we een verzadigd alkaan ($C_{12}H_{26}$) hebben gekraakt, komen we 2 waterstofatomen tekort om twee nieuwe verzadigde alkanen te maken. Er moet dus een onverzadigde stof ontstaan met een dubbele binding: **buteen** (een alkeen).

---
**Tip voor morgen:** Lees bij vraagstukken over scheiden (H6) altijd eerst de tabel met eigenschappen (6.4) goed door om te kijken welke stof waar oplosbaar in is. Bij naamgeving (H7) is het handig om de keten even op krassen te tekenen en de nummers erbij te zetten voordat je de naam opschrijft. Heel veel succes!
